            border-radius: 8px;
            min-width: 50px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,51,153,0.3);
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;

        .event-item:last-child {

        .event-icon {

            text-align: center;
            font-size: 16px;

        .event-player {
            font-weight: 700;
            font-size: 14px;
            color: #333;
        }

        .event-type {
            font-size: 12px;
            color: #666;
        }

        .btn-standings-jump {
            background: #003399;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            position: absolute;
            right: 0;
            box-shadow: 0 2px 8px rgba(0,51,153,0.2);

        .btn-standings-jump:hover {
            background: #002266;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,51,153,0.3);

        @media screen and (max-width: 991px) {
            .btn-standings-jump {
                position: static;
                margin-left: 0;

        @media screen and (max-width: 480px) {

            .modal-content {

            }
        }
    </style>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" data-cloudinary-id="OŠKKP_logo">
</head>

<body>
    <script src="/assets/js/header.js"></script>
    <div id="site-header-root"></div>

    <!-- Main Content -->
    <div class="container">
        <h1 class="page-title"><i class="fas fa-calendar-check"></i> Zápasy</h1>

        <!-- Filtre podla statusu -->
        <div class="category-tabs" id="matchStatusTabs">
            <button class="category-tab active" data-match-type="upcoming" onclick="setMatchType('upcoming')">Nadchádzajúce</button>
            <button class="category-tab" data-match-type="finished" onclick="setMatchType('finished')">Odohrané</button>
        </div>

        <!-- Filtre podla kategorie -->
        <div class="category-tabs" id="categoryTabs"></div>

        <!-- Matches List -->
        <div id="matchesContainer" class="matches-grid"></div>
    </div>

    <!-- Match Detail Modal -->
    <div id="matchModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeMatchModal()"><i class="fas fa-times"></i></button>
            <div id="matchDetailContent"></div>
        </div>
    </div>

    <script>
        // ====== GLOBÁLNE PREMENNÉ ======
        let MATCHES = {};
        let currentUser = null;
        let activeCategory = 'all';
        let activeMatchType = 'upcoming';
        let SPORTSNET_INFO = {
            status: 'LOADING',
            source: 'SportNet API',
            fetchedAt: null,
            count: 0,
            cache: 'NONE'
        };

        function resolveApiBase() {
            const host = window.location.hostname;
            const isHttpsPage = window.location.protocol === 'https:';
            if (host.endsWith('.vercel.app')) {
                return '/api';
            }
            if (host === 'localhost' || host === '127.0.0.1') {
                if (isHttpsPage) {
                    return '/api';
                }
                return 'http://localhost:4000/api';
            }
            const configuredRaw = window.localStorage ? window.localStorage.getItem('OSK_API_BASE') : '';
            const configured = String(configuredRaw || '').trim();
            if (configured) {
                const normalized = configured.replace(/\/+$/, '');
                return normalized.endsWith('/api') ? normalized : `${normalized}/api`;
            }

            return '/api';
        }

        const API_BASE = resolveApiBase();

        /* ===== 10-MINUTE CACHE HELPER ===== */
        async function cachedFetch(url, options = {}) {
            const CACHE_TTL = 10 * 60 * 1000;
            const cacheKey = 'osk_cf__' + url;
            try {
                const raw = localStorage.getItem(cacheKey);
                if (raw) {
                    const entry = JSON.parse(raw);
                    if (Date.now() - entry.ts < CACHE_TTL) {
                        return entry.data;
                    }
                }
            } catch (_) { }
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data })); } catch (_) { }
                return data;
            } catch (err) {
                console.error('Fetch error:', err);
                return null;
            }
        }

        function detectCategory(competition) {
            const c = String(competition || '').toLowerCase();
            if (c.includes('u9') || c.includes('u09') || c.includes('mladších príprav')) return 'u09_pripravka';
            if (c.includes('u11') || c.includes('príprav')) return 'u11_pripravka';
            if (c.includes('u13') || c.includes('mladší žiaci') || c.includes('mladších žiakov')) return 'u13_ziaci';
            if (c.includes('u15') || c.includes('starší žiaci') || c.includes('starších žiakov')) return 'u15_ziaci';
            if (c.includes('dorast') || c.includes('u17') || c.includes('u19')) return 'u19_dorast';
            return 'dospeli';
        }

        const CATEGORY_LABELS = {
            all: 'Všetky',
            dospeli: 'Dospelí',
            u19_dorast: 'Dorast U19',
            u15_ziaci: 'Starší žiaci U15',
            u13_ziaci: 'Mladší žiaci U13',
            u11_pripravka: 'Prípravka U11',
            u09_pripravka: 'Prípravka U09'
        };

        const CATEGORY_ORDER = ['all', 'dospeli', 'u19_dorast', 'u15_ziaci', 'u13_ziaci', 'u11_pripravka', 'u09_pripravka'];

        // Club logo registry - maps normalized team name to logo URL
        const CLUB_LOGOS = {};

        function normalizeTeamName(name) {
            return String(name || '').toLowerCase().trim().replace(/\s+/g, ' ');
        }

        function registerClubLogo(name, logoUrl) {
            if (!name || !logoUrl) return;
            CLUB_LOGOS[normalizeTeamName(name)] = logoUrl;
        }

        function getClubLogo(name) {
            return CLUB_LOGOS[normalizeTeamName(name)] || null;
        }

        function buildClubLogoImg(name, size) {
            size = size || 24;
            const logo = getClubLogo(name);
            if (logo) {
                return `<img src="${logo}" alt="${name}" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:50%;background:#fff;flex-shrink:0;">`;
            }
            const abbr = String(name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
            const own = isOwnTeam(name);
            return `<div class="standings-team-abbr${own ? ' own-team' : ''}" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.38)}px;">${abbr}</div>`;
        }

        function normalizeSportsnetMatch(item, index) {
            const startsAt = item.startsAt || (item.date && item.time ? `${item.date}T${item.time}` : null);
            const dateValue = item.date || (startsAt ? startsAt.slice(0, 10) : null);
            const timeValue = item.time || (startsAt ? startsAt.slice(11, 16) : null) || '00:00';
            const rawStatus = String(item.status || '').toLowerCase();
            const competition = item.competition || 'Súťaž';

            let status = 'upcoming';
            const matchDateObj = new Date((dateValue || '1970-01-01') + 'T' + timeValue);
            const now = new Date();

            if (rawStatus.includes('live') || rawStatus === 'inprogress') {
                status = 'live';
            } else if (matchDateObj < now) {
                status = 'finished';
            } else {
                status = 'upcoming';
            }

            // Register club logos from sportnet data
            const homeTeamName = item.homeTeam || 'Domáci';
            const awayTeamName = item.awayTeam || 'Hostia';
            if (item.homeLogo) registerClubLogo(homeTeamName, item.homeLogo);
            if (item.awayLogo) registerClubLogo(awayTeamName, item.awayLogo);

            return {
                id: String(item.id || `sportsnet_${index}`),
                date: dateValue || new Date().toISOString().slice(0, 10),
                time: timeValue,
                homeTeam: homeTeamName,
                awayTeam: awayTeamName,
                homeLogo: item.homeLogo || null,
                awayLogo: item.awayLogo || null,
                homeScore: item.scoreHome ?? null,
                awayScore: item.scoreAway ?? null,
                status,
                location: item.venue || 'Štadión',
                address: item.venue || 'Neuvedené',
                competition,
                category: detectCategory(competition),
                detailUrl: item.detailUrl || null,
                videoUrl: item.videoUrl || null,
                homeFormation: '-',
                awayFormation: '-',
                referee: 'Neuvedené',
                homeLineup: [],
                homeStats: null,
                awayStats: null,
                videoRecordings: {
                    firstHalf: null,
                    secondHalf: null
                },
                events: Array.isArray(item.events) ? item.events : []
            };
        }

        async function loadMatchesFromApi() {
            try {
                const payload = await cachedFetch(
                    `${API_BASE}/sportsnet/matches`,
                    { method: 'GET', headers: { Accept: 'application/json' } }
                );
                const items = Array.isArray(payload?.items) ? payload.items : [];

                const isUnconfigured =
                    payload?.source === 'sportsnet.unconfigured' ||
                    payload?.cache === 'BYPASS';

                if (isUnconfigured) {
                    MATCHES = {};
                    SPORTSNET_INFO = {
                        status: 'UNCONFIGURED',
                        source: 'Sportsnet endpoint nie je nastavený',
                        fetchedAt: payload?.fetchedAt || new Date().toISOString(),
                        count: 0,
                        cache: 'NONE'
                    };
                    return;
                }

                SPORTSNET_INFO = {
                    status: 'OK',
                    source: payload?.source || 'sportsnet.online',
                    fetchedAt: payload?._fetchedAt || payload?.fetchedAt || new Date().toISOString(),
                    count: items.length,
                    cache: payload?.cache || 'MISS'
                };

                if (items.length === 0) {
                    SPORTSNET_INFO.status = 'EMPTY';
                    MATCHES = {};
                    return;
                }

                const normalizedMatches = {};
                items.forEach((item, index) => {
                    const normalized = normalizeSportsnetMatch(item, index);
                    normalizedMatches[normalized.id] = normalized;
                });

                MATCHES = normalizedMatches;
            } catch (error) {
                MATCHES = {};
                SPORTSNET_INFO = {
                    status: 'ERROR',
                    source: 'Chyba pri načítaní zo Sportsnet API',
                    fetchedAt: new Date().toISOString(),
                    count: 0,
                    cache: 'NONE'
                };
                console.warn('Sportsnet dáta sa nepodarilo načítať.', error);
            }
        }

        // ====== TABUĽKA SÚŤAŽE ======
        // STANDINGS is an array of group objects: { competition, part, competitionId, partId, results[] }
        let STANDINGS = [];
        const OWN_TEAM_PATTERNS = ['kamenná poruba', 'kamenna poruba', 'ošk kamen', 'osk kamen'];

        function isOwnTeam(name) {
            const lower = String(name || '').toLowerCase();
            return OWN_TEAM_PATTERNS.some(p => lower.includes(p));
        }

        async function loadStandingsFromApi() {
            try {
                const payload = await cachedFetch(
                    `${API_BASE}/sportsnet/standings`,
                    { method: 'GET', headers: { Accept: 'application/json' } }
                );
                STANDINGS = Array.isArray(payload.standings) ? payload.standings : [];
            } catch (error) {
                STANDINGS = [];
                console.warn('Nepodarilo sa načítať tabuľku.', error);
            }
        }

        function renderStandingGroup(group) {
            const teams = group.results || [];
            const qualifyCount = 2;
            const title = group.part && group.part !== group.competition
                ? `${group.competition} – ${group.part}`
                : group.competition;

            const rows = teams.map((team, idx) => {
                const rank = team.rank ?? idx + 1;
                const name = team.teamName || team.name || 'Tím';
                const diff = (team.goalsFor || 0) - (team.goalsAgainst || 0);
                const diffStr = diff > 0 ? `+${diff}` : String(diff);
                const diffClass = diff > 0 ? 'standings-diff-pos' : (diff < 0 ? 'standings-diff-neg' : '');
                const own = isOwnTeam(name);
                const qualifies = rank <= qualifyCount && teams.length > qualifyCount;
                const abbr = name.split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
                const rankCell = qualifies
                    ? `<span class="standings-rank-qualifier">${rank}</span>`
                    : `<span class="standings-rank">${rank}.</span>`;
                const goals = `${team.goalsFor ?? 0}:${team.goalsAgainst ?? 0}`;

                return `
                    <tr style="${own ? 'background: #f0f5ff;' : ''}">
                        <td class="standings-rank-cell">
                            <div style="display:flex;align-items:center;padding-left:8px;">${rankCell}</div>
                        </td>
                        <td>
                            <div class="standings-team-cell">
                                ${buildClubLogoImg(name, 30)}
                                <span class="standings-team-name${own ? ' own-team' : ''}">${name}</span>
                            </div>
                        </td>
                        <td class="center">${team.played ?? 0}</td>
                        <td class="center">${team.won ?? 0}</td>
                        <td class="center">${team.drawn ?? 0}</td>
                        <td class="center">${team.lost ?? 0}</td>
                        <td class="center">${goals}</td>
                        <td class="center"><span class="${diffClass}">${diffStr}</span></td>
                        <td class="center"><span class="standings-points">${team.points ?? 0}</span></td>
                    </tr>`;
            }).join('');

            const legend = qualifyCount > 0 && teams.length > qualifyCount
                ? `<div class="standings-legend"><div class="standings-legend-dot"></div> Postup do ďalšej fázy</div>`
                : '';

            return `
                <div class="standings-group">
                    <div class="standings-group-header"><i class="fas fa-table-cells"></i> ${title}</div>
                    <div class="table-wrap" style="border:none; border-radius:10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <table class="standings-table">
                            <thead>
                                <tr>
                                    <th class="standings-rank-cell">#</th>
                                    <th>Tím</th>
                                    <th class="center" title="Odohrané zápasy">OZ</th>
                                    <th class="center" title="Výhry">V</th>
                                    <th class="center" title="Remízy">R</th>
                                    <th class="center" title="Prehry">P</th>
                                    <th class="center" title="Góly">Góly</th>
                                    <th class="center" title="Rozdiel gólov">+/-</th>
                                    <th class="center" title="Body">B</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    ${legend}
                </div>`;
        }

        let activeStandingsCat = 'dospeli';

        function initStandingsTabs() {
            const tabs = document.querySelectorAll('#standingsTabs .standings-tab');
            if (!tabs.length) return;
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    activeStandingsCat = tab.getAttribute('data-cat');
                    renderStandings();
                });
            });
        }

        function detectStandingsCategory(competition, part) {
            const text = `${competition} ${part}`.toLowerCase();
            if (text.includes('dorast') || text.includes('u19') || text.includes('u17')) return 'dorast';
            if (text.includes('žiac') || text.includes('ziac') || text.includes('u15') || text.includes('u13')) return 'ziaci';
            if (text.includes('príprav') || text.includes('priprav') || text.includes('u11') || text.includes('u09') || text.includes('u9') || text.includes('respect')) return 'pripravka';
            return 'dospeli';
        }

        function renderStandings() {
            const container = document.getElementById('standingsSectionContainer');
            if (!container) return;

            if (STANDINGS.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#666;padding:20px;">Tabuľka je prázdna.</p>';
                return;
            }

            const ownGroups = STANDINGS.filter(g =>
                (g.results || []).some(t => isOwnTeam(t.teamName || t.name))
            );

            const filtered = ownGroups.filter(g => detectStandingsCategory(g.competition, g.part) === activeStandingsCat);

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#666;padding:20px;">Žiadne tabuľky pre túto kategóriu.</p>';
                return;
            }

            container.innerHTML = filtered.map(group => renderStandingGroup(group)).join('');
        }

        // ====== INICIALIZÁCIA ======
        window.addEventListener('load', async function () {
            const params = new URLSearchParams(window.location.search);
            const tabParam = params.get('tab');
            if (tabParam === 'finished' || tabParam === 'upcoming') {
                activeMatchType = tabParam;
            }
            
            // Predbežne nastavíme CSS aktivitu pre match status tab
            const activeBtn = document.querySelector(`#matchStatusTabs .category-tab[data-match-type="${activeMatchType}"]`);
            if (activeBtn) {
                document.querySelectorAll('#matchStatusTabs .category-tab').forEach(b => b.classList.remove('active'));
                activeBtn.classList.add('active');
            }

            await Promise.all([
                loadMatchesFromApi()
            ]);
            renderCategoryTabs();
            renderMatches();
        });

        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            if (!container) return;
            const allMatches = Object.values(MATCHES);
            if (allMatches.length === 0) { container.innerHTML = ''; return; }

            const usedCategories = new Set(allMatches.map(m => m.category));
            const tabs = CATEGORY_ORDER.filter(c => c === 'all' || usedCategories.has(c));

            container.innerHTML = tabs.map(cat => `
                <button class="category-tab${activeCategory === cat ? ' active' : ''}" onclick="setCategory('${cat}')">
                    ${CATEGORY_LABELS[cat] || cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            activeCategory = cat;
            renderCategoryTabs();
            renderMatches();
        }

        function setMatchType(type) {
            activeMatchType = type;
            document.querySelectorAll('#matchStatusTabs .category-tab').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`#matchStatusTabs .category-tab[data-match-type="${type}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('matchesContainer');
            const allMatches = Object.values(MATCHES);

            if (allMatches.length === 0) {
                let msg = 'Žiadne zápasy na zobrazenie';
                if (SPORTSNET_INFO.status === 'ERROR') {
                    msg = 'Nepodarilo sa načítať zápasy zo Sportsnet API. Skúste neskôr.';
                } else if (SPORTSNET_INFO.status === 'UNCONFIGURED') {
                    msg = 'Sportsnet API nie je nakonfigurované. Kontaktujte administrátora.';
                }
                container.innerHTML = `<div class="no-matches"><p>${msg}</p></div>`;
                return;
            }

            const filtered = activeCategory === 'all'
                ? allMatches
                : allMatches.filter(m => m.category === activeCategory);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-matches"><p>Žiadne zápasy pre túto kategóriu.</p></div>';
                return;
            }

            let upcoming = filtered
                .filter(m => m.status === 'upcoming' || m.status === 'live')
                .sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
            let results = filtered
                .filter(m => m.status === 'finished')
                .sort((a, b) => new Date(b.date + 'T' + b.time) - new Date(a.date + 'T' + a.time));

            const matchesToRender = activeMatchType === 'upcoming' ? upcoming : results;

            if (matchesToRender.length === 0) {
                container.innerHTML = `<div class="no-matches"><p>Žiadne ${activeMatchType === 'upcoming' ? 'nadchádzajúce' : 'odohrané'} zápasy na zobrazenie.</p></div>`;
                return;
            }

            container.innerHTML = matchesToRender.map(match => renderMatchCard(match)).join('');
        }

        function renderMatchCard(match) {
            const dateObj = new Date(match.date + 'T' + (match.time || '00:00'));
            const formattedDate = dateObj.toLocaleDateString('sk-SK', {
                day: 'numeric',
                month: 'numeric',
                year: 'numeric'
            });
            const formattedDay = dateObj.toLocaleDateString('sk-SK', { weekday: 'short' });

            const homeSrc = match.homeLogo || getClubLogo(match.homeTeam);
            const awaySrc = match.awayLogo || getClubLogo(match.awayTeam);

            let scoreHtml = '';
            if (match.status === 'finished' || match.status === 'live') {
                scoreHtml = `<div class="match-main-score">${match.homeScore ?? 0} : ${match.awayScore ?? 0}</div>`;
            } else {
                scoreHtml = `<div class="match-vs-label">VS</div>`;
            }

            const statusClass = match.status;
            const statusText = {
                'upcoming': 'Budúci',
                'finished': 'Koniec',
                'live': 'Naživo'
            }[match.status];

            const categoryLabel = CATEGORY_LABELS[match.category] || match.category;

            return `
                <div class="match-card" onclick="openMatchModal('${match.id}')">
                    <div class="match-card-header">
                        <div class="match-competition">${match.competition}</div>
                        <div class="match-status-badge ${statusClass}">${statusText}</div>
                    </div>
                    
                    <div class="match-body">
                        <div class="match-teams-row">
                            <div class="team-container">
                                <div class="team-logo-wrap">
                                    ${homeSrc ? `<img src="${homeSrc}" alt="${match.homeTeam}">` : buildClubLogoImg(match.homeTeam, 36)}
                                </div>
                                <div class="team-name">${match.homeTeam}</div>
                            </div>
                            <div class="match-center">
                                ${scoreHtml}
                                <div style="font-size: 11px; font-weight: 700; color: #94a3b8;">${match.time || '--:--'}</div>
                            </div>
                            <div class="team-container">
                                <div class="team-logo-wrap">
                                    ${awaySrc ? `<img src="${awaySrc}" alt="${match.awayTeam}">` : buildClubLogoImg(match.awayTeam, 36)}
                                </div>
                                <div class="team-name">${match.awayTeam}</div>
                            </div>
                        </div>
                    </div>

                    <div class="match-footer">
                        <div class="match-footer-top">
                            <div class="match-info-item">
                                <i class="fas fa-calendar-alt"></i>
                                <span>${formattedDay}, ${formattedDate}</span>
                            </div>
                            <div class="match-category-tag">${categoryLabel}</div>
                        </div>
                        <div class="match-info-item full-width">
                            <i class="fas fa-map-marker-alt"></i>
                            <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${match.location || 'Miesto neurčené'}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function openMatchModal(matchId) {
            const match = MATCHES[matchId];
            if (!match) return;

            let detailHtml = generateMatchDetail(match);
            document.getElementById('matchDetailContent').innerHTML = detailHtml;
            document.getElementById('matchModal').classList.add('active');
        }

        function closeMatchModal() {
            document.getElementById('matchModal').classList.remove('active');
        }

        function generateSportnetVideoSection(match) {
            const compLower = String(match.competition || '').toLowerCase().replace(/\s+/g, '');
            const isViLiga = compLower.includes('vi.liga') || compLower.includes('vi.league');
            if (!isViLiga || match.status !== 'finished') return '';

            let videoLink = match.videoUrl || match.detailUrl || null;
            if (!videoLink) return '';

            videoLink = videoLink.replace(/\/+$/, '');
            if (!videoLink.endsWith('/videozaznam')) {
                videoLink += '/videozaznam';
            }
            videoLink += '/';

            return `
                <div class="sportnet-link-section" style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 12px; text-align: center;">
                    <div style="font-weight: 800; color: #003399; margin-bottom: 10px;"><i class="fas fa-video"></i> Videozáznam zápasu</div>
                    <a href="${videoLink}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:10px;background:#003399;color:#fff;padding:12px 24px;border-radius:30px;font-weight:bold;text-decoration:none;font-size:14px;box-shadow: 0 4px 12px rgba(0,51,153,0.2);">
                        <i class="fas fa-play"></i> Pozrieť na SportNet
                    </a>
                </div>
            `;
        }

        function generateMatchDetail(match) {
            const dateObj = new Date(match.date + 'T' + (match.time || '00:00'));
            const formattedDate = dateObj.toLocaleDateString('sk-SK', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            const homeSrc = match.homeLogo || getClubLogo(match.homeTeam);
            const awaySrc = match.awayLogo || getClubLogo(match.awayTeam);
            
            const homeLogoHtml = homeSrc ? `<img src="${homeSrc}" alt="${match.homeTeam}">` : buildClubLogoImg(match.homeTeam, 70);
            const awayLogoHtml = awaySrc ? `<img src="${awaySrc}" alt="${match.awayTeam}">` : buildClubLogoImg(match.awayTeam, 70);

            let statusPillClass = match.status;
            let statusText = {
                'upcoming': 'Budúci zápas',
                'finished': 'Zápas ukončený',
                'live': 'Zápas prebieha'
            }[match.status];

            let scoreDisplay = '';
            if (match.status === 'finished' || match.status === 'live') {
                scoreDisplay = `
                    <div class="detail-score-box">
                        <div class="detail-score-value">${match.homeScore} : ${match.awayScore}</div>
                        <div class="detail-status-pill ${statusPillClass}">${statusText}</div>
                    </div>
                `;
            } else {
                scoreDisplay = `
                    <div class="detail-score-box">
                        <div class="detail-vs-label">VS</div>
                        <div class="detail-status-pill ${statusPillClass}">${statusText}</div>
                    </div>
                `;
            }

            let eventsHtml = '';
            if (match.status === 'finished') {
                const goals = (match.events || []).filter(e => ['goal', 'goal-own', 'penalty'].includes(e.type));
                if (goals.length > 0) {
                    eventsHtml = `
                        <div class="events-container">
                            <div class="events-title"><i class="fas fa-futbol"></i> Góly v zápase</div>
                            <div class="events-grid">
                                <div class="event-group">
                                    ${goals.filter(e => e.team === 'home').map(e => `
                                        <div class="event-row event-home">
                                            <span class="event-player">${e.player}</span>
                                            <span class="event-time">${e.minute}'</span>
                                            <div class="event-icon"><i class="fas fa-futbol"></i></div>
                                        </div>
                                    `).join('') || '<div style="flex:1"></div>'}
                                </div>
                                <div class="event-group">
                                    ${goals.filter(e => e.team === 'away').map(e => `
                                        <div class="event-row event-away">
                                            <div class="event-icon"><i class="fas fa-futbol"></i></div>
                                            <span class="event-player">${e.player}</span>
                                            <span class="event-time">${e.minute}'</span>
                                        </div>
                                    `).join('') || '<div style="flex:1"></div>'}
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            const categoryLabel = CATEGORY_LABELS[match.category] || match.category;

            return `
                <div class="detail-header">
                    <div class="detail-competition-row">
                        <div class="detail-competition-name">${match.competition}</div>
                        <div class="detail-category-badge" data-category="${match.category}">${categoryLabel}</div>
                    </div>
                    <div class="detail-date-time">${formattedDate} • ${match.time || '--:--'}</div>
                </div>

                <div class="detail-main-display">
                    <div class="detail-team">
                        <div class="detail-team-logo-wrap">${homeLogoHtml}</div>
                        <div class="detail-team-name">${match.homeTeam}</div>
                    </div>
                    
                    ${scoreDisplay}

                    <div class="detail-team">
                        <div class="detail-team-logo-wrap">${awayLogoHtml}</div>
                        <div class="detail-team-name">${match.awayTeam}</div>
                    </div>
                </div>

                <div class="detail-info-strip">
                    <div class="detail-info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${match.location || 'Miesto neuvedené'}</span>
                    </div>
                    <div class="detail-info-item">
                        <i class="fas fa-user-tie"></i>
                        <span>Rozhodca: ${match.referee || 'Neuvedené'}</span>
                    </div>
                </div>

                ${eventsHtml}

                ${generateSportnetVideoSection(match)}
            `;
        }

        // Zatvorenie modalu kliknutím mimo
        document.addEventListener('click', function (event) {
            const modal = document.getElementById('matchModal');
            if (event.target === modal) {
                closeMatchModal();
            }
        });

        // Zatvorenie modalu klávesom ESC
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeMatchModal();
            }
        });
    </script>
