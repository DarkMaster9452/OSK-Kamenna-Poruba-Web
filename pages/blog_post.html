<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Článok | OŠK Kamenná Poruba</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P152RNBL34"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-P152RNBL34');
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 9px 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-back {
            background: #f4f4f4;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-primary {
            background: #003399;
            color: #fff;
        }

        .btn-danger {
            background: #fff;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .btn-danger:hover {
            background: #e74c3c;
            color: #fff;
        }

        .article-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 32px 36px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        }

        @media (max-width: 600px) {
            .article-card {
                padding: 20px 16px;
            }

            .container {
                padding: 16px 12px;
            }
        }

        .article-title {
            margin: 0 0 14px;
            color: #003399;
            font-size: 28px;
            line-height: 1.3;
        }

        @media (max-width: 600px) {
            .article-title {
                font-size: 22px;
            }
        }

        .meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .post-tag {
            background: #eee;
            color: #555;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        .featured-badge {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .view-count {
            color: #999;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .article-image {
            width: 100%;
            max-height: 480px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 24px;
            border: 1px solid #eee;
            background: #f2f2f2;
            display: none;
        }

        .article-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
            font-size: 16px;
        }

        .article-footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .manage-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        #loadingState,
        #errorState {
            text-align: center;
            padding: 48px 0;
            color: #666;
        }

        #errorState {
            color: #e74c3c;
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #ddd;
            border-top-color: #003399;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #site-footer-root {
            margin-top: 50px;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" data-cloudinary-id="OŠKKP_logo">
</head>

<body>
    <script src="/assets/js/session.js"></script>
    <script src="/assets/js/header.js"></script>
    <div id="site-header-root"></div>

    <div class="container">
        <div class="topbar">
            <a href="/pages/blog.html" class="btn btn-back">
                <i class="fas fa-arrow-left"></i> Späť na blog
            </a>
            <div id="manageActions" class="manage-actions" style="display:none;"></div>
        </div>

        <div id="loadingState">
            <div class="spinner"></div>
            <div>Načítavam článok...</div>
        </div>

        <div id="errorState" style="display:none;">
            <i class="fas fa-exclamation-triangle" style="font-size:32px;margin-bottom:12px;display:block;"></i>
            <div id="errorMessage">Článok sa nepodarilo načítať.</div>
            <a href="/pages/blog.html" class="btn btn-back" style="margin-top:16px;">
                <i class="fas fa-arrow-left"></i> Späť na blog
            </a>
        </div>

        <div id="articleWrapper" style="display:none;">
            <article class="article-card">
                <h1 id="articleTitle" class="article-title"></h1>
                <div class="meta" id="articleMeta"></div>
                <img id="articleImage" class="article-image" alt="Obrázok k článku" />
                <div id="articleContent" class="article-content"></div>
                <div class="article-footer">
                    <a href="/pages/blog.html" class="btn btn-back">
                        <i class="fas fa-arrow-left"></i> Späť na blog
                    </a>
                    <div id="articleFooterMeta" style="color:#aaa;font-size:12px;"></div>
                </div>
            </article>
        </div>
    </div>

    <script>
        const API_BASE = window.OSKSession ? window.OSKSession.getApiBase() : '/api';
        let currentUser = { username: null, role: null, isLoggedIn: false };
        let currentPost = null;

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Neznámy dátum';
            return date.toLocaleDateString('sk-SK', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function canManagePost(post) {
            if (!currentUser || !currentUser.isLoggedIn) return false;
            if (currentUser.role === 'admin') return true;
            return ['blogger', 'coach'].includes(currentUser.role) && post.createdBy === currentUser.username;
        }

        function renderManageActions(post) {
            const wrap = document.getElementById('manageActions');
            if (!wrap) return;
            if (!canManagePost(post)) {
                wrap.style.display = 'none';
                return;
            }
            wrap.style.display = 'flex';
            wrap.innerHTML = `
                <button class="btn btn-primary" onclick="editPost()"><i class="fas fa-edit"></i> Upraviť</button>
                <button class="btn btn-danger" onclick="deletePost()"><i class="fas fa-trash"></i> Odstrániť</button>
            `;
        }

        async function editPost() {
            if (!currentPost) return;
            window.location.href = `/pages/blog.html?edit=${encodeURIComponent(currentPost.id)}`;
        }

        async function deletePost() {
            if (!currentPost || !confirm('Odstrániť tento článok?')) return;
            try {
                const csrfToken = window.OSKSession ? await window.OSKSession.ensureCsrfToken() : '';
                const response = await fetch(`${API_BASE}/blog/${currentPost.id}`, {
                    method: 'DELETE',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrfToken }
                });
                if (!response.ok) {
                    const payload = await response.json().catch(() => ({}));
                    throw new Error(payload.message || 'Nepodarilo sa odstrániť článok.');
                }
                window.location.href = '/pages/blog.html';
            } catch (error) {
                alert(error.message || 'Nepodarilo sa odstrániť článok.');
            }
        }

        async function incrementViewCount(id) {
            try {
                const storageKey = `blog_viewed_${id}`;
                const last = localStorage.getItem(storageKey);
                const now = Date.now();
                if (last && now - parseInt(last, 10) < 24 * 60 * 60 * 1000) return;
                await fetch(`${API_BASE}/blog/${id}/view`, {
                    method: 'POST',
                    credentials: 'include'
                });
                localStorage.setItem(storageKey, String(now));
            } catch {
                // Non-critical, ignore errors
            }
        }

        function renderPost(post) {
            document.title = `${post.title} | OŠK Kamenná Poruba`;

            const titleEl = document.getElementById('articleTitle');
            if (titleEl) titleEl.textContent = post.title || 'Bez názvu';

            const metaEl = document.getElementById('articleMeta');
            if (metaEl) {
                const tagHtml = (post.tags && post.tags.length > 0)
                    ? `<span class="post-tag">${escapeHtml(post.tags[0])}</span>`
                    : '';
                const featuredHtml = post.featured
                    ? `<span class="featured-badge"><i class="fas fa-thumbtack"></i> Pripnuté</span>`
                    : '';
                const viewHtml = `<span class="view-count"><i class="fas fa-eye"></i> ${post.viewCount ?? 0}</span>`;
                metaEl.innerHTML = `${tagHtml}${featuredHtml} <span>${formatDate(post.createdAt)}</span> ${viewHtml}`;
            }

            const img = document.getElementById('articleImage');
            if (img) {
                if (post.imageUrl) {
                    img.src = post.imageUrl;
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }
            }

            const contentEl = document.getElementById('articleContent');
            if (contentEl) {
                const escaped = (post.content || '')
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const rendered = escaped
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');
                contentEl.innerHTML = rendered;
            }

            const footerMeta = document.getElementById('articleFooterMeta');
            if (footerMeta && post.updatedAt && post.updatedAt !== post.createdAt) {
                footerMeta.textContent = `Naposledy upravené: ${formatDate(post.updatedAt)}`;
            }

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('articleWrapper').style.display = 'block';
        }

        async function init() {
            if (window.OSKSession) {
                currentUser = await window.OSKSession.syncCurrentUserFromSession();
            }

            const postId = new URLSearchParams(window.location.search).get('id');
            if (!postId) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Nebol zadaný identifikátor článku.';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/blog/${postId}`, { credentials: 'include' });
                if (!response.ok) {
                    throw new Error(response.status === 404 ? 'Článok neexistuje alebo bol odstránený.' : 'Nepodarilo sa načítať článok.');
                }
                const payload = await response.json();
                currentPost = payload.item;
                renderPost(currentPost);
                renderManageActions(currentPost);
                // Increment view count (fire-and-forget)
                incrementViewCount(postId);
            } catch (error) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                document.getElementById('errorMessage').textContent = error.message || 'Nepodarilo sa načítať článok.';
            }
        }

        window.editPost = editPost;
        window.deletePost = deletePost;

        document.addEventListener('DOMContentLoaded', init);

        window.addEventListener('osk-auth-changed', async () => {
            if (window.OSKSession) {
                currentUser = await window.OSKSession.syncCurrentUserFromSession();
            }
            if (currentPost) renderManageActions(currentPost);
        });
    </script>

    <div id="site-footer-root"></div>
    <script src="/assets/js/footer.js"></script>
</body>

</html>
