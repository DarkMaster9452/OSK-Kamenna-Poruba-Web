    <script>
        /* ===== API BASE ===== */
        function resolveApiBase() {
            const host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://localhost:4000/api';
            }
            const raw = window.localStorage ? window.localStorage.getItem('OSK_API_BASE') : '';
            const configured = String(raw || '').trim();
            if (configured) {
                const n = configured.replace(/\/+$/, '');
                return n.endsWith('/api') ? n : `${n}/api`;
            }
            return '/api';
        }
        const API_BASE = resolveApiBase();

        /* ===== LOCAL ALBUM DATA ===== */
        const LOCAL_ALBUMS = {
            historia: [
                '/assets/images/HISTORIA/100_1314.JPG',
                '/assets/images/HISTORIA/100_2855.JPG',
                '/assets/images/HISTORIA/100_2857.JPG',

                '/assets/images/HISTORIA/DSC_0488.JPG',

                '/assets/images/HISTORIA/img006 upr 4.jpg',
                '/assets/images/HISTORIA/img007 upr 5.jpg',
                '/assets/images/HISTORIA/img008 upr 6.jpg',
                '/assets/images/HISTORIA/img009 upr 7.jpg',
                '/assets/images/HISTORIA/img010 upr.jpg',
                '/assets/images/HISTORIA/img013 upr 1.jpg',
                '/assets/images/HISTORIA/img016 upr8.jpg',
                '/assets/images/HISTORIA/img017 upr 9.jpg',
                '/assets/images/HISTORIA/img018 upr 10.jpg',
                '/assets/images/HISTORIA/img019 upr.jpg',
                '/assets/images/HISTORIA/img021.jpg',
                '/assets/images/HISTORIA/img192.jpg',
                '/assets/images/HISTORIA/img193.jpg',
                '/assets/images/HISTORIA/P8270140.JPG',
                '/assets/images/HISTORIA/Plagat OŠK.jpg',
                '/assets/images/HISTORIA/Spoločná fotka muži.JPG',
                '/assets/images/HISTORIA/ST.Ž..jpg'
            ],
            '2024-tribuny': [
                '/assets/images/2024 tribuny/459462f5-9449-4d0b-a77f-a1809ddd4700.jpg',
                '/assets/images/2024 tribuny/9b614a75-dbfa-44ea-89f4-99932e1d3658.jpg',
                '/assets/images/2024 tribuny/a74b9d59-9366-4c43-aeeb-3c2be2bb8e90.jpg',
                '/assets/images/2024 tribuny/f7f854d6-01aa-4544-80ee-8dc4c8d82b89.jpg'
            ],
            '2023-pristresok': [],
            '2023-siet': [],
            zapasy: [
                '/assets/images/10750142878023431842.jpg',
                '/assets/images/2.jpg',
                '/assets/images/508120564_29838519272462811_2048504803720081817_n.jpg',
                '/assets/images/508433324_29841234952191243_3332785514084510977_n.jpg',
                '/assets/images/508538663_29841234848857920_7529913858397432447_n.jpg',
                '/assets/images/51597284815_c985abef70_b.jpg',
                '/assets/images/IMG_5259-Enhanced-NR-1024x683.jpg',
                '/assets/images/memorial-milana-smehyla-pre-favorizovanu-kamennu-porubu-117368.1920x1080t.jpg',
                '/assets/images/memorial-milana-smehyla-pre-favorizovanu-kamennu-porubu-13661.1920x1080t.jpg',
                '/assets/images/rozhovor-kamenna-poruba-okusi-prvykrat-v-historii-klubu-krajsku-sutaz-117322.1920x1080t.jpg'
            ]
        };

        /* ===== STATE ===== */
        let instagramItems = [];
        let currentAlbum = 'all';
        let currentImgIdx = 0;
        const PAGE_SIZE = 20;
        let renderedCount = 0;
        let itemsToShow = [];

        /* ===== HELPERS ===== */
        function makeLocalItem(src, album) {
            const parts = src.split('/');
            const name = decodeURIComponent(parts[parts.length - 1]).replace(/\.[^.]+$/, '');
            return { src, alt: name, album, type: 'local' };
        }

        function makeInstagramItem(item) {
            return {
                src: item.imageUrl,
                alt: item.caption ? String(item.caption).slice(0, 150) : 'Instagram',
                album: 'instagram',
                type: 'instagram',
                permalink: item.permalink || null
            };
        }

        function getAllLocalItems() {
            const items = [];
            Object.keys(LOCAL_ALBUMS).forEach(function (album) {
                LOCAL_ALBUMS[album].forEach(function (src) {
                    items.push(makeLocalItem(src, album));
                });
            });
            return items;
        }

        /* ===== RENDER ===== */
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            renderedCount = 0;

            if (currentAlbum === 'all') {
                itemsToShow = instagramItems.map(makeInstagramItem).concat(getAllLocalItems());
            } else if (currentAlbum === 'instagram') {
                itemsToShow = instagramItems.map(makeInstagramItem);
            } else {
                itemsToShow = (LOCAL_ALBUMS[currentAlbum] || []).map(function (src) {
                    return makeLocalItem(src, currentAlbum);
                });
            }

            if (!itemsToShow.length) {
                grid.innerHTML = '<div class="empty-msg">Žiadne fotky v tomto albume.</div>';
                document.getElementById('loadMoreBtn').hidden = true;
                return;
            }

            renderNextBatch();
        }

        function renderNextBatch() {
            const grid = document.getElementById('galleryGrid');
            const batch = itemsToShow.slice(renderedCount, renderedCount + PAGE_SIZE);
            const fragment = document.createDocumentFragment();

            batch.forEach(function (item) {
                var wrapper = document.createElement('div');
                wrapper.className = 'gallery-item';

                var img = document.createElement('img');
                img.className = 'gallery-image';
                img.src = item.src;
                img.alt = item.alt;
                img.loading = 'lazy';
                wrapper.appendChild(img);

                if (item.type === 'instagram') {
                    var cap = document.createElement('div');
                    cap.className = 'gallery-caption';
                    cap.textContent = item.alt;
                    if (item.permalink) {
                        var br = document.createElement('br');
                        cap.appendChild(br);
                        var a = document.createElement('a');
                        a.className = 'gallery-caption-link';
                        a.href = item.permalink;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.textContent = 'Pozrieť na Instagrame';
                        cap.appendChild(a);
                    }
                    wrapper.appendChild(cap);
                }

                fragment.appendChild(wrapper);
            });

            grid.appendChild(fragment);
            renderedCount += batch.length;

            var btn = document.getElementById('loadMoreBtn');
            btn.hidden = renderedCount >= itemsToShow.length;
        }

        /* ===== INSTAGRAM FEED ===== */
        var INSTAGRAM_CACHE_KEY = 'osk_instagram_cache';
        var INSTAGRAM_CACHE_TTL = 4 * 60 * 60 * 1000; // 4 hours in ms

        function getInstagramCache() {
            try {
                var raw = localStorage.getItem(INSTAGRAM_CACHE_KEY);
                if (!raw) return null;
                var cached = JSON.parse(raw);
                if (!cached || !cached.ts || !Array.isArray(cached.items)) return null;
                if (Date.now() - cached.ts > INSTAGRAM_CACHE_TTL) return null;
                return cached.items;
            } catch (_) { return null; }
        }

        function setInstagramCache(items) {
            try {
                localStorage.setItem(INSTAGRAM_CACHE_KEY, JSON.stringify({ ts: Date.now(), items: items }));
            } catch (_) { }
        }

        async function loadInstagramFeed() {
            var status = document.getElementById('statusText');
            try {
                var cached = getInstagramCache();
                if (cached) {
                    instagramItems = cached.filter(function (it) { return it && it.imageUrl; });
                    status.hidden = false;
                    status.textContent = instagramItems.length
                        ? 'Instagram: ' + instagramItems.length + ' príspevkov (z vyrovnávacej pamäte).'
                        : 'Instagram zatiaľ nevrátil žiadne príspevky.';
                    return;
                }

                status.hidden = false;
                status.textContent = 'Načítavam Instagram príspevky…';

                var endpoints = [
                    API_BASE + '/instagram/feed?all=true',
                    '/api/instagram/feed?all=true'
                ];
                var response = null;
                for (var i = 0; i < endpoints.length; i++) {
                    try {
                        var r = await fetch(endpoints[i], { method: 'GET' });
                        if (r.ok) { response = r; break; }
                    } catch (_) { }
                }

                if (!response) {
                    status.textContent = 'Instagram feed sa momentálne nepodarilo načítať.';
                    return;
                }

                var payload = await response.json();
                var items = Array.isArray(payload && payload.items) ? payload.items : [];
                instagramItems = items.filter(function (it) { return it && it.imageUrl; });
                setInstagramCache(instagramItems);

                status.textContent = instagramItems.length
                    ? 'Instagram: ' + instagramItems.length + ' príspevkov načítaných.'
                    : 'Instagram zatiaľ nevrátil žiadne príspevky.';
            } catch (e) {
                status.textContent = 'Instagram feed sa momentálne nepodarilo načítať.';
            }
        }

        /* ===== TABS ===== */
        document.getElementById('albumTabs').addEventListener('click', function (e) {
            var tab = e.target.closest('.album-tab');
            if (!tab) return;
            document.querySelectorAll('.album-tab').forEach(function (t) { t.classList.remove('active'); });
            tab.classList.add('active');
            currentAlbum = tab.dataset.album;
            renderGallery();
        });

        /* ===== LOAD MORE ===== */
        document.getElementById('loadMoreBtn').addEventListener('click', function () {
            renderNextBatch();
        });

        /* ===== MODAL ===== */
        var modal = document.getElementById('galleryModal');
        var modalImg = document.getElementById('modalImg');

        function getVisibleImages() {
            return Array.from(document.querySelectorAll('.gallery-image'));
        }

        function showModal(idx) {
            var imgs = getVisibleImages();
            if (!imgs.length) return;
            if (idx < 0) idx = imgs.length - 1;
            if (idx >= imgs.length) idx = 0;
            currentImgIdx = idx;
            modalImg.src = imgs[idx].src;
            modalImg.alt = imgs[idx].alt;
            modal.classList.add('open');
        }

        document.getElementById('galleryGrid').addEventListener('click', function (e) {
            var img = e.target.closest('.gallery-image');
            if (!img) return;
            var all = getVisibleImages();
            showModal(all.indexOf(img));
        });

        document.getElementById('modalClose').addEventListener('click', function () {
            modal.classList.remove('open');
            modalImg.src = '';
        });

        document.getElementById('modalPrev').addEventListener('click', function (e) {
            e.stopPropagation();
            showModal(currentImgIdx - 1);
        });

        document.getElementById('modalNext').addEventListener('click', function (e) {
            e.stopPropagation();
            showModal(currentImgIdx + 1);
        });

        modal.addEventListener('click', function (e) {
            if (e.target === modal) {
                modal.classList.remove('open');
                modalImg.src = '';
            }
        });

        document.addEventListener('keydown', function (e) {
            if (!modal.classList.contains('open')) return;
            if (e.key === 'ArrowLeft') showModal(currentImgIdx - 1);
            else if (e.key === 'ArrowRight') showModal(currentImgIdx + 1);
            else if (e.key === 'Escape') { modal.classList.remove('open'); modalImg.src = ''; }
        });

        /* ===== INIT ===== */
        (async function () {
            await loadInstagramFeed();
            renderGallery();
        })();
    </script>

    <!-- Scroll to top (mobile) -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Späť hore"
        title="Späť hore"
        style="display:none;position:fixed;bottom:24px;right:20px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#003399;color:#fff;border:2px solid #ffd700;box-shadow:0 4px 14px rgba(0,0,0,0.25);font-size:18px;cursor:pointer;align-items:center;justify-content:center;"><i
            class="fas fa-chevron-up"></i></button>
    <script>
        (function () {
            var btn = document.getElementById('scrollTopBtn');
            window.addEventListener('scroll', function () {
                btn.style.display = (window.innerWidth <= 768 && window.scrollY > 220) ? 'flex' : 'none';
            }, { passive: true });
        })();
    </script>
    <script>
        (function() {
            var toggle = document.getElementById('shMobileToggle');
            var nav = document.getElementById('shMainNav');
            if (toggle && nav) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = nav.classList.toggle('open');
                    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                    if (!open) {
                        nav.querySelectorAll('.sh-submenu-parent').forEach(function(p) { p.classList.remove('sh-open'); });
                    }
                });
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('#shMobileToggle') && !e.target.closest('#shMainNav')) {
                        nav.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                        nav.querySelectorAll('.sh-submenu-parent').forEach(function(p) { p.classList.remove('sh-open'); });
                    }
                });

            }
            try {
                var stored = localStorage.getItem('currentUser');
                if (stored) {
                    var user = JSON.parse(stored);
                    var name = user.username || user.name || '';
                    if (name) {
                        var btn = document.getElementById('shLoginBtn');
                        var mBtn = document.getElementById('shMobileLoginBtn');
                        if (btn) btn.textContent = name;
                        if (mBtn) mBtn.textContent = name;
                    }
                    if (user.role && user.role !== 'blogger') {
                        var trainLink = document.getElementById('shTrainingNavLink');
                        var infoLink = document.getElementById('shInfoNavLink');
                        if (trainLink) trainLink.style.display = '';
                        if (infoLink) infoLink.style.display = '';
                    }
                }
            } catch(e) {}
})();
    </script>
    <script>
        (function () {
            var path = window.location.pathname;
            var nav = document.getElementById('shMainNav');
            if (!nav) return;
            nav.querySelectorAll('a').forEach(function (a) {
                var href = a.getAttribute('href');
                if (!href || href.charAt(0) === '#') return;
                try {
                    var linkPath = new URL(a.href, window.location.origin).pathname;
                    if (linkPath === path) a.classList.add('active');
                } catch (e) {}
            });
        })();
    </script>
