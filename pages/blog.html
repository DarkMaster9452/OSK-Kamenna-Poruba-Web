    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #003399 0%, #1a5ccc 100%);
            color: #fff;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            padding: 18px 24px;
        }

        .topbar h1 {
            margin: 0;
            color: #ffd700;
            font-size: 28px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .btn-primary {
            background: #ffd700;
            color: #003399;
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        .card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 24px 28px;
            margin-bottom: 24px;
        }

        .card h2 {
            margin: 0 0 12px;
            color: #ffd700;
            font-size: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        input:not([type="checkbox"]),
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            font-family: inherit;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .checkbox-inline {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            user-select: none;
        }

        .checkbox-inline input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ffd700;
            cursor: pointer;
            flex: 0 0 auto;
            margin: 0;
        }

        .post {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 20px 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .post:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .post h3 {
            margin: 0 0 10px;
            color: #ffd700;
        }

        .meta {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .excerpt {
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.6;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        /* Hamburger menu */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .mobile-nav {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,51,153,0.97);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .mobile-nav.open {
            display: flex;
        }

        .mobile-nav a {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);

            text-align: center;
            transition: background 0.2s;
        }

        .mobile-nav a:hover {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            color: #ffd700;
        }

        .mobile-nav-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .hamburger { display: flex; }

        /* ── Site-wide navigation header ── */
        header.site-header {
            background: linear-gradient(135deg, #003399 0%, #1a5ccc 100%);

            margin-right: 24px;

        header.site-header .sh-nav {

        header.site-header .sh-nav ul {

            flex-wrap: nowrap;

        header.site-header .sh-nav a {

            text-decoration: none;

        }
        @media (max-width: 768px) {
            header.site-header .header-top { padding: 12px 14px; gap: 10px; position: relative; }
            header.site-header .sh-logo > span { display: none; }

            header.site-header .sh-mobile-toggle { display: inline-flex; }
            header.site-header .sh-nav {

                padding: 10px 14px 14px;

            }
            header.site-header .sh-nav.open { display: block; }
            header.site-header .sh-nav ul { width: 100%; flex-direction: column; align-items: stretch; gap: 6px; flex-wrap: nowrap; font-size: 14px; }
            header.site-header .sh-nav li { width: 100%; }

        .modal {
            position: fixed;
            inset: 0;

        .modal.open {

    <div class="container">
        <div class="topbar">
            <h1><i class="fas fa-blog"></i> Klubový blog</h1>
        </div>

        <div id="composerCard" class="card">
            <h2><i class="fas fa-pen"></i> Nový blog príspevok</h2>
            <div class="form-grid">
                <input id="postTitle" placeholder="Nadpis príspevku" maxlength="200" />

            </div>

    <div id="postDetailModal" class="modal" aria-hidden="true">
        <div class="modal-card">
            <div class="row" style="margin-bottom:10px;">
                <h3 id="postDetailTitle"></h3>
                <button class="btn btn-back" type="button" onclick="closePostDetail()">
                    <i class="fas fa-times"></i> Zavrieť
                </button>
            </div>
            <div id="postDetailMeta" class="meta"></div>
            <div id="postDetailContent" class="modal-content"></div>
        </div>
    </div>

    <script>
        function resolveApiBase() {
            const host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://localhost:4000/api';
            }
            const configuredRaw = window.localStorage ? window.localStorage.getItem('OSK_API_BASE') : '';
            const configured = String(configuredRaw || '').trim();
            if (configured) {
                const normalized = configured.replace(/\/+$/, '');
                return normalized.endsWith('/api') ? normalized : `${normalized}/api`;
            }

            return '/api';
        }

        const API_BASE = resolveApiBase();
        let csrfTokenCache = null;
        let currentUser = null;
        let manageItems = [];

        async function ensureCsrfToken() {
            if (csrfTokenCache) return csrfTokenCache;
            const response = await fetch(`${API_BASE}/csrf-token`, { method: 'GET', credentials: 'include' });
            if (!response.ok) throw new Error('Nepodarilo sa načítať CSRF token.');
            const payload = await response.json();
            csrfTokenCache = payload.csrfToken;
            return csrfTokenCache;
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Neznámy dátum';
            return date.toLocaleString('sk-SK');
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildExcerpt(content, maxLength = 220) {
            const normalized = String(content || '').replace(/\s+/g, ' ').trim();
            if (normalized.length <= maxLength) {
                return normalized;
            }

            return `${normalized.slice(0, maxLength).trim()}...`;
        }

        async function loadSessionUser() {
            try {
                const response = await fetch(`${API_BASE}/me`, { method: 'GET', credentials: 'include' });
                if (!response.ok) return null;
                const payload = await response.json();
                return payload.user || null;
            } catch (_) {
                return null;
            }
        }

        async function loadPublicPosts() {
            const response = await fetch(`${API_BASE}/blog`, { method: 'GET', credentials: 'include' });
            if (!response.ok) throw new Error('Nepodarilo sa načítať blog príspevky.');
            const payload = await response.json();
            return Array.isArray(payload.items) ? payload.items : [];
        }

        async function loadManagePosts() {
            if (!currentUser || (currentUser.role !== 'blogger' && currentUser.role !== 'admin')) {
                manageItems = [];
                return;
            }

            const response = await fetch(`${API_BASE}/blog/manage`, { method: 'GET', credentials: 'include' });
            if (!response.ok) {
                manageItems = [];
                return;
            }

            const payload = await response.json();
            manageItems = Array.isArray(payload.items) ? payload.items : [];
        }

        function canManagePost(post) {
            if (!currentUser) return false;
            if (currentUser.role === 'admin') return true;
            return currentUser.role === 'blogger' && post.createdBy === currentUser.username;
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');
            if (!posts.length) {
                container.innerHTML = '<div class="muted">Zatiaľ nie sú žiadne publikované blog príspevky.</div>';
                return;
            }

            container.innerHTML = posts.map((post) => {
                const canDelete = canManagePost(post);
                return `
                    <article class="post" onclick="openPostDetail('${post.id}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPostDetail('${post.id}')">
                        <div class="row">
                            <h3>${escapeHtml(post.title)}</h3>
                            ${canDelete ? `<button class="btn btn-danger" onclick="event.stopPropagation();deletePost('${post.id}')"><i class="fas fa-trash"></i> Odstrániť</button>` : ''}
                        </div>
                        <div class="meta">Autor: ${post.createdBy} • ${formatDate(post.createdAt)}</div>
                        <div class="excerpt">${escapeHtml(buildExcerpt(post.content))}</div>
                        <div class="btn btn-ghost" style="pointer-events:none;display:inline-flex;align-items:center;gap:6px;margin-top:6px;">
                            <i class="fas fa-book-open"></i> Čítať celý článok
                        </div>
                    </article>
                `;
            }).join('');
        }

        function openPostDetail(id) {
            const modal = document.getElementById('postDetailModal');
            const title = document.getElementById('postDetailTitle');
            const meta = document.getElementById('postDetailMeta');
            const content = document.getElementById('postDetailContent');
            if (!modal || !title || !meta || !content) {
                return;
            }

            const post = window.__blogPostsById && window.__blogPostsById.get(id);
            if (!post) {
                return;
            }

            title.textContent = post.title || 'Bez názvu';
            meta.textContent = `Autor: ${post.createdBy || 'Neznámy'} • ${formatDate(post.createdAt)}`;
            content.textContent = String(post.content || '');
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            history.pushState({ postModal: true }, '');
        }

        function closePostDetail() {
            const modal = document.getElementById('postDetailModal');
            if (!modal) {
                return;
            }

            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('popstate', function(e) {
            const modal = document.getElementById('postDetailModal');
            if (modal && modal.classList.contains('open')) {
                closePostDetail();
            }
        });

        async function refresh() {
            currentUser = await loadSessionUser();
            const roleInfo = document.getElementById('blogRoleInfo');
            const composer = document.getElementById('composerCard');

            if (currentUser && (currentUser.role === 'blogger' || currentUser.role === 'admin')) {
                composer.style.display = 'block';
                roleInfo.textContent = `Prihlásený: ${currentUser.username} (${currentUser.role})`;
            } else {
                composer.style.display = 'none';
            }

            const publicPosts = await loadPublicPosts();
            await loadManagePosts();

            const byId = new Map();
            publicPosts.forEach((item) => byId.set(item.id, item));
            manageItems.forEach((item) => byId.set(item.id, item));
            const orderedPosts = Array.from(byId.values()).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            window.__blogPostsById = new Map(orderedPosts.map((post) => [post.id, post]));
            renderPosts(orderedPosts);
        }

        async function createPost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const published = document.getElementById('postPublished').checked;
            const message = document.getElementById('composerMessage');

            if (!title || !content) {
                message.textContent = 'Nadpis aj obsah sú povinné.';
                return;
            }

            try {
                const csrfToken = await ensureCsrfToken();
                const response = await fetch(`${API_BASE}/blog`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrfToken
                    },
                    body: JSON.stringify({ title, content, published })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || 'Nepodarilo sa vytvoriť blog príspevok.');

                message.textContent = 'Príspevok bol vytvorený.';
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('postPublished').checked = true;
                await refresh();
            } catch (error) {
                message.textContent = error.message || 'Nepodarilo sa vytvoriť blog príspevok.';
            }
        }

        async function deletePost(id) {
            if (!confirm('Odstrániť blog príspevok?')) return;

            try {
                const csrfToken = await ensureCsrfToken();
                const response = await fetch(`${API_BASE}/blog/${id}`, {
                    method: 'DELETE',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrfToken
                    }
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || 'Nepodarilo sa odstrániť blog príspevok.');

                await refresh();
            } catch (error) {
                alert(error.message || 'Nepodarilo sa odstrániť blog príspevok.');
            }
        }

        window.deletePost = deletePost;
        window.createPost = createPost;
        window.openPostDetail = openPostDetail;
        window.closePostDetail = closePostDetail;

        function openMobileNav() {
            document.getElementById('mobileNav').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeMobileNav() {
            document.getElementById('mobileNav').classList.remove('open');
            document.body.style.overflow = '';
        }
        window.openMobileNav = openMobileNav;
        window.closeMobileNav = closeMobileNav;

        document.getElementById('postDetailModal')?.addEventListener('click', (event) => {
            if (event.target && event.target.id === 'postDetailModal') {
                closePostDetail();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closePostDetail();
            }
        });

        refresh().catch((error) => {
            const container = document.getElementById('postsContainer');
            container.innerHTML = `<div class="muted">${error.message || 'Načítanie blogu zlyhalo.'}</div>`;
        });
    </script>

    <!-- Scroll to top (mobile) -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Späť hore"
        title="Späť hore"
        style="display:none;position:fixed;bottom:24px;right:20px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#003399;color:#fff;border:2px solid #ffd700;box-shadow:0 4px 14px rgba(0,0,0,0.25);font-size:18px;cursor:pointer;align-items:center;justify-content:center;"><i
            class="fas fa-chevron-up"></i></button>
    <script>
        (function () {
            var btn = document.getElementById('scrollTopBtn');
            window.addEventListener('scroll', function () {
                btn.style.display = (window.innerWidth <= 768 && window.scrollY > 220) ? 'flex' : 'none';
            }, { passive: true });
        })();
    </script>
    <script>
        (function() {
            var toggle = document.getElementById('shMobileToggle');
            var nav = document.getElementById('shMainNav');
            if (toggle && nav) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = nav.classList.toggle('open');
                    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                    if (!open) {
                        nav.querySelectorAll('.sh-submenu-parent').forEach(function(p) { p.classList.remove('sh-open'); });
                    }
                });
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('#shMobileToggle') && !e.target.closest('#shMainNav')) {
                        nav.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                        nav.querySelectorAll('.sh-submenu-parent').forEach(function(p) { p.classList.remove('sh-open'); });
                    }
                });
            }
            try {
                var stored = localStorage.getItem('currentUser');
                if (stored) {
                    var user = JSON.parse(stored);
                    var name = user.username || user.name || '';
                    if (name) {
                        var btn = document.getElementById('shLoginBtn');
                        var mBtn = document.getElementById('shMobileLoginBtn');
                        if (btn) btn.textContent = name;
                        if (mBtn) mBtn.textContent = name;
                    }
                    if (user.role && user.role !== 'blogger') {
                        var trainLink = document.getElementById('shTrainingNavLink');
                        var infoLink = document.getElementById('shInfoNavLink');
                        if (trainLink) trainLink.style.display = '';
                        if (infoLink) infoLink.style.display = '';
                    }
                }
            } catch(e) {}
        })();
    </script>
<script src="/assets/js/cloudinary-assets.js"></script>
