    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            color: #333;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        h1, .page-title, .topbar h1 {
            margin: 0;
            color: #003399;
            font-size: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media screen and (max-width: 768px) {
            h1, .page-title, .topbar h1 {
                font-size: 26px !important;
            }
        }

        @media screen and (max-width: 480px) {
            h1, .page-title, .topbar h1 {
                font-size: 24px !important;
            }
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-back {
            background: #f4f4f4;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-primary {
            background: #003399;
            color: #fff;
        }

        .btn-danger {
            background: #fff;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .btn-danger:hover {
            background: #e74c3c;
            color: #fff;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card h2 {
            margin: 0 0 15px;
            color: #003399;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        input:not([type="checkbox"]),
        textarea,
        select {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            color: #333;
            padding: 10px;
            font-family: inherit;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .checkbox-inline {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #333;
            user-select: none;
        }

        .checkbox-inline input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #003399;
            cursor: pointer;
            flex: 0 0 auto;
            margin: 0;
        }

        .post {
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #fff;
            padding: 20px 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s;
        }

        .post:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transform: translateY(-2px);
            border-color: #003399;
        }

        .post h3 {
            margin: 0 0 10px;
            color: #003399;
            font-size: 22px;
        }

        .meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
        }

        .excerpt {
            color: #444;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .btn-ghost {
            background: #fff;
            color: #003399;
            border: 1px solid #003399;
        }

        .btn-ghost:hover {
            background: #003399;
            color: #fff;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 9999;
        }

        .modal.open {
            display: flex;
        }

        .modal-card {
            width: 100%;
            max-width: 840px;
            max-height: 90vh;
            overflow: auto;
            border-radius: 12px;
            background: #fdfdfd;
            padding: 24px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-card h3 {
            margin: 0 0 10px;
            color: #003399;
            font-size: 26px;
        }

        .modal-content {
            margin-top: 15px;
            white-space: pre-wrap;
            line-height: 1.7;
            color: #333;
        }

        .post-detail-image {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #eee;
            display: none;
            border: 1px solid #ddd;
        }

        .muted {
            color: #777;
            font-size: 14px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 5px;
        }

        .tag-tab {
            padding: 8px 18px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tag-tab:hover {
            border-color: #003399;
            color: #003399;
            background: rgba(0, 51, 153, 0.05);
        }

        .tag-tab.active {
            background: #003399;
            color: #fff;
            border-color: #003399;
            box-shadow: 0 4px 10px rgba(0, 51, 153, 0.2);
        }

        .post-tag {
            background: #eee;
            color: #555;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        #composerCard {
            display: none;
        }

        /* Standardized Compact Footer */
        footer {
            background: #003399;
            color: white;
            padding: 40px 20px 30px;
            margin-top: 50px;
            border-top: 5px solid #ffd700;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 30px;
        }

        .footer-section {
            flex: 1;
            min-width: 250px;
        }

        .footer-section h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex !important;
            align-items: center;
            gap: 10px;
            border: none;
            padding: 0;
        }

        .footer-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-section ul li {
            margin-bottom: 10px;
        }

        .footer-section ul li a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-block;
        }

        .footer-section ul li a:hover {
            color: #ffd700;
            transform: translateX(5px);
        }

        .social-icons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .social-icons a {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-icons a:hover {
            background: #ffd700;
            color: #003399;
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 40px auto 0;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            footer {
                padding: 40px 15px 25px;
            }
            .footer-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 40px;
            }
            .footer-section {
                width: 100%;
            }
            .footer-section h3 {
                justify-content: center;
            }
            .social-icons {
                justify-content: center;
            }
            .footer-section ul li a:hover {
                transform: none;
            }
        }
    </style>

</head>

<body>
    <script src="/assets/js/header.js"></script>
    <div id="site-header-root"></div>
    <div class="container">
        <div class="topbar">
            <h1><i class="fas fa-blog"></i> Klubový blog</h1>
        </div>

        <div id="composerCard" class="card">
            <h2><i class="fas fa-pen"></i> Nový blog príspevok</h2>
            <div class="form-grid">
                <input id="postTitle" placeholder="Nadpis príspevku" maxlength="200" />
                <textarea id="postContent" placeholder="Obsah príspevku"></textarea>
                <div style="margin: 8px 0;">
                    <label style="display:block;margin-bottom:6px;font-size:14px;color:#003399;font-weight:bold;"><i class="fas fa-image"></i> Priložiť fotku (max. 5MB):</label>
                    <input type="file" id="postImage" accept="image/*" style="padding: 6px; font-size: 13px;" />
                </div>
                <div style="margin: 8px 0;">
                    <label style="display:block;margin-bottom:6px;font-size:14px;color:#003399;font-weight:bold;"><i class="fas fa-tag"></i> Kategória:</label>
                    <select id="postTag" style="padding: 6px; font-size: 13px;">
                        <option value="Novinky">Novinky</option>
                        <option value="Zápasy">Zápasy</option>
                        <option value="Rozhovory">Rozhovory</option>
                        <option value="Mládež">Mládež</option>
                        <option value="Ostatné">Ostatné</option>
                    </select>
                </div>
                <label class="checkbox-inline"><input id="postPublished" type="checkbox" checked /> Publikovať
                    ihneď</label>
                <div>
                    <button class="btn btn-primary" onclick="createPost()">
                        <i class="fas fa-plus"></i> Pridať príspevok
                    </button>
                </div>
                <div id="composerMessage" class="muted"></div>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <h2 style="margin:0;"><i class="fas fa-newspaper"></i> Príspevky</h2>
                <div id="blogRoleInfo" class="muted"></div>
            </div>
            <div id="tagFilters" class="tag-tabs" style="margin-top: 20px;"></div>
            <div id="postsContainer"></div>
        </div>
    </div>

    <div id="postDetailModal" class="modal" aria-hidden="true">
        <div class="modal-card">
            <div class="row" style="margin-bottom:10px;">
                <h3 id="postDetailTitle"></h3>
                <button class="btn btn-back" type="button" onclick="closePostDetail()">
                    <i class="fas fa-times"></i> Zavrieť
                </button>
            </div>
            <div id="postDetailMeta" class="meta"></div>
            <img id="postDetailImage" class="post-detail-image" alt="Obrázok k príspevku" />
            <div id="postDetailContent" class="modal-content"></div>
        </div>
    </div>

    <script>
        function resolveApiBase() {
            const host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://localhost:4000/api';
            }
            const configuredRaw = window.localStorage ? window.localStorage.getItem('OSK_API_BASE') : '';
            const configured = String(configuredRaw || '').trim();
            if (configured) {
                const normalized = configured.replace(/\/+$/, '');
                return normalized.endsWith('/api') ? normalized : `${normalized}/api`;
            }

            return '/api';
        }

        const API_BASE = resolveApiBase();
        let csrfTokenCache = null;
        let currentUser = null;
        let manageItems = [];
        let currentTagFilter = 'Všetky';

        function renderTagFilters(posts) {
            const container = document.getElementById('tagFilters');
            if (!container) return;

            const tags = new Set(['Všetky']);
            posts.forEach(p => {
                if (p.tags && p.tags.length > 0) {
                    p.tags.forEach(t => tags.add(t));
                }
            });

            container.innerHTML = Array.from(tags).map(tag => `
                <div class="tag-tab ${currentTagFilter === tag ? 'active' : ''}" onclick="filterByTag('${escapeHtml(tag)}')">
                    ${escapeHtml(tag)}
                </div>
            `).join('');
        }

        function filterByTag(tag) {
            currentTagFilter = tag;
            const orderedPosts = window.__blogPostsById ? Array.from(window.__blogPostsById.values()).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)) : [];
            renderTagFilters(orderedPosts);
            renderPosts(orderedPosts);
        }

        function readCsrfCookie() {
            const match = document.cookie.match(/(^|;\s*)_csrf=([^;]*)/);
            return match ? decodeURIComponent(match[2]) : '';
        }

        function invalidateCsrfToken() {
            csrfTokenCache = null;
        }

        async function ensureCsrfToken() {
            if (csrfTokenCache) return csrfTokenCache;

            try {
                const response = await fetch(`${API_BASE}/csrf-token`, { method: 'GET', credentials: 'include' });
                if (!response.ok) throw new Error('Nepodarilo sa načítať CSRF token.');
                const payload = await response.json();
                csrfTokenCache = payload.csrfToken;
            } catch (_) {
                csrfTokenCache = readCsrfCookie();
            }
            return csrfTokenCache;
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Neznámy dátum';
            return date.toLocaleString('sk-SK');
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildExcerpt(content, maxLength = 220) {
            const normalized = String(content || '').replace(/\s+/g, ' ').trim();
            if (normalized.length <= maxLength) {
                return normalized;
            }

            return `${normalized.slice(0, maxLength).trim()}...`;
        }

        async function loadSessionUser() {
            try {
                const response = await fetch(`${API_BASE}/me`, { method: 'GET', credentials: 'include' });
                if (!response.ok) return null;
                const payload = await response.json();
                return payload.user || null;
            } catch (_) {
                return null;
            }
        }

        async function loadPublicPosts() {
            const response = await fetch(`${API_BASE}/blog`, { method: 'GET', credentials: 'include' });
            if (!response.ok) throw new Error('Nepodarilo sa načítať blog príspevky.');
            const payload = await response.json();
            return Array.isArray(payload.items) ? payload.items : [];
        }

        async function loadManagePosts() {
            if (!currentUser || (currentUser.role !== 'blogger' && currentUser.role !== 'admin')) {
                manageItems = [];
                return;
            }

            const response = await fetch(`${API_BASE}/blog/manage`, { method: 'GET', credentials: 'include' });
            if (!response.ok) {
                manageItems = [];
                return;
            }

            const payload = await response.json();
            manageItems = Array.isArray(payload.items) ? payload.items : [];
        }

        function canManagePost(post) {
            if (!currentUser) return false;
            if (currentUser.role === 'admin') return true;
            return currentUser.role === 'blogger' && post.createdBy === currentUser.username;
        }

        function renderPosts(orderedPosts) {
            const container = document.getElementById('postsContainer');
            
            let posts = orderedPosts;
            if (currentTagFilter !== 'Všetky') {
                posts = orderedPosts.filter(p => p.tags && p.tags.includes(currentTagFilter));
            }

            if (!posts.length) {
                container.innerHTML = '<div class="muted" style="margin-top: 12px;">Zatiaľ nie sú žiadne príspevky pre tento filter.</div>';
                return;
            }

            container.innerHTML = posts.map((post) => {
                const canDelete = canManagePost(post);
                const tagHtml = (post.tags && post.tags.length > 0) ? `<div class="post-tag">${escapeHtml(post.tags[0])}</div>` : '';
                return `
                    <article class="post" onclick="openPostDetail('${post.id}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPostDetail('${post.id}')">
                        <div class="row">
                            <h3>${escapeHtml(post.title)}</h3>
                            ${canDelete ? `<button class="btn btn-danger" onclick="event.stopPropagation();deletePost('${post.id}')"><i class="fas fa-trash"></i> Odstrániť</button>` : ''}
                        </div>
                        <div class="meta">${tagHtml} Autor: ${post.createdBy} • ${formatDate(post.createdAt)}</div>
                        <div class="excerpt">${escapeHtml(buildExcerpt(post.content))}</div>
                        <div class="btn btn-ghost" style="pointer-events:none;display:inline-flex;align-items:center;gap:6px;margin-top:6px;">
                            <i class="fas fa-book-open"></i> Čítať celý článok
                        </div>
                    </article>
                `;
            }).join('');
        }

        function openPostDetail(id) {
            const modal = document.getElementById('postDetailModal');
            const title = document.getElementById('postDetailTitle');
            const meta = document.getElementById('postDetailMeta');
            const content = document.getElementById('postDetailContent');
            if (!modal || !title || !meta || !content) {
                return;
            }

            const post = window.__blogPostsById && window.__blogPostsById.get(id);
            if (!post) {
                return;
            }

            title.textContent = post.title || 'Bez názvu';
            meta.innerHTML = post.tags && post.tags.length > 0 ? 
                `<div class="post-tag">${escapeHtml(post.tags[0])}</div> Autor: ${post.createdBy || 'Neznámy'} • ${formatDate(post.createdAt)}` :
                `Autor: ${post.createdBy || 'Neznámy'} • ${formatDate(post.createdAt)}`;
            
            const img = document.getElementById('postDetailImage');
            if (img) {
                if (post.imageUrl) {
                    img.src = post.imageUrl;
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }
            }

            content.textContent = String(post.content || '');
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            history.pushState({ postModal: true }, '');
        }

        function closePostDetail() {
            const modal = document.getElementById('postDetailModal');
            if (!modal) {
                return;
            }

            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('popstate', function(e) {
            const modal = document.getElementById('postDetailModal');
            if (modal && modal.classList.contains('open')) {
                closePostDetail();
            }
        });

        async function refresh() {
            currentUser = await loadSessionUser();
            const roleInfo = document.getElementById('blogRoleInfo');
            const composer = document.getElementById('composerCard');

            if (currentUser && (currentUser.role === 'blogger' || currentUser.role === 'admin')) {
                composer.style.display = 'block';
                roleInfo.textContent = `Prihlásený: ${currentUser.username} (${currentUser.role})`;
            } else {
                composer.style.display = 'none';
            }

            const publicPosts = await loadPublicPosts();
            await loadManagePosts();

            const byId = new Map();
            publicPosts.forEach((item) => byId.set(item.id, item));
            manageItems.forEach((item) => byId.set(item.id, item));
            const orderedPosts = Array.from(byId.values()).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            window.__blogPostsById = new Map(orderedPosts.map((post) => [post.id, post]));
            renderTagFilters(orderedPosts);
            renderPosts(orderedPosts);
        }

        async function createPost() {
            const titleInput = document.getElementById('postTitle');
            const contentInput = document.getElementById('postContent');
            const fileInput = document.getElementById('postImage');
            const tagInput = document.getElementById('postTag');
            const publishedInput = document.getElementById('postPublished');
            const message = document.getElementById('composerMessage');

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const tags = tagInput ? [tagInput.value] : [];
            const published = publishedInput.checked;

            if (!title || !content) {
                message.textContent = 'Nadpis aj obsah sú povinné.';
                return;
            }

            try {
                message.textContent = 'Pripravujem...';
                const csrfToken = await ensureCsrfToken();
                let imageUrl = null;

                // Handle image upload if selected
                if (fileInput.files && fileInput.files[0]) {
                    message.textContent = 'Nahrávam fotku...';
                    const formData = new FormData();
                    formData.append('image', fileInput.files[0]);

                    const uploadResponse = await fetch(`${API_BASE}/cloudinary/upload`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'x-csrf-token': csrfToken
                        },
                        body: formData
                    });

                    if (!uploadResponse.ok) {
                        const errData = await uploadResponse.json().catch(() => ({}));
                        throw new Error(errData.message || 'Nepodarilo sa nahrať fotku.');
                    }

                    const uploadData = await uploadResponse.json();
                    imageUrl = uploadData.url;
                }

                message.textContent = 'Ukladám príspevok...';
                const response = await fetch(`${API_BASE}/blog`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrfToken
                    },
                    body: JSON.stringify({ title, content, published, imageUrl, tags })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || 'Nepodarilo sa vytvoriť blog príspevok.');

                message.textContent = 'Príspevok bol vytvorený.';
                titleInput.value = '';
                contentInput.value = '';
                fileInput.value = '';
                publishedInput.checked = true;
                await refresh();
            } catch (error) {
                message.textContent = error.message || 'Nepodarilo sa vytvoriť blog príspevok.';
            }
        }

        async function deletePost(id) {
            if (!confirm('Odstrániť blog príspevok?')) return;

            try {
                const csrfToken = await ensureCsrfToken();
                const response = await fetch(`${API_BASE}/blog/${id}`, {
                    method: 'DELETE',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrfToken
                    }
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || 'Nepodarilo sa odstrániť blog príspevok.');

                await refresh();
            } catch (error) {
                alert(error.message || 'Nepodarilo sa odstrániť blog príspevok.');
            }
        }

        window.deletePost = deletePost;
        window.createPost = createPost;
        window.openPostDetail = openPostDetail;
        window.closePostDetail = closePostDetail;

        function openMobileNav() {
            document.getElementById('mobileNav').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeMobileNav() {
            document.getElementById('mobileNav').classList.remove('open');
            document.body.style.overflow = '';
        }
        window.openMobileNav = openMobileNav;
        window.closeMobileNav = closeMobileNav;

        document.getElementById('postDetailModal')?.addEventListener('click', (event) => {
            if (event.target && event.target.id === 'postDetailModal') {
                closePostDetail();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closePostDetail();
            }
        });

        refresh().catch((error) => {
            const container = document.getElementById('postsContainer');
            container.innerHTML = `<div class="muted">${error.message || 'Načítanie blogu zlyhalo.'}</div>`;
        });
    </script>
