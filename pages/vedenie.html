<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedenie klubu | OŠK Kamenná Poruba</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #003399 0%, #1a5ccc 100%);
            color: white;
            padding: 20px 40px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .board-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .board-card:hover {
            transform: translateY(-5px);
        }

        .board-icon {
            font-size: 50px;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .board-name {
            font-size: 22px;
            font-weight: bold;
            color: #003399;
            margin-bottom: 5px;
        }

        .board-role {
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #003399;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header>
        <h1>Vedenie klubu</h1>
    </header>

    <div class="container">
        <p style="text-align: center; font-size: 18px; color: #666;">
            Spoznajte ľudí, ktorí stoja za fungovaním OŠK Kamenná Poruba.
        </p>

        <div class="board-grid">
            <!-- Predseda -->
            <div class="board-card">
                <div class="board-icon"><i class="fas fa-user-tie"></i></div>
                <div class="board-name">Meno Priezvisko</div>
                <div class="board-role">Predseda klubu</div>
            </div>

            <!-- Podpredseda -->
            <div class="board-card">
                <div class="board-icon"><i class="fas fa-user-tie"></i></div>
                <div class="board-name">Meno Priezvisko</div>
                <div class="board-role">Podpredseda klubu</div>
            </div>

            <!-- Manažér -->
            <div class="board-card">
                <div class="board-icon"><i class="fas fa-user-cog"></i></div>
                <div class="board-name">Meno Priezvisko</div>
                <div class="board-role">Manažér klubu</div>
            </div>

            <!-- Členovia správnej rady -->
            <div class="board-card">
                <div class="board-icon"><i class="fas fa-users"></i></div>
                <div class="board-name">Meno Priezvisko</div>
                <div class="board-role">Člen správnej rady</div>
            </div>

            <div class="board-card">
                <div class="board-icon"><i class="fas fa-users"></i></div>
                <div class="board-name">Meno Priezvisko</div>
                <div class="board-role">Člen správnej rady</div>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Späť na hlavnú stránku</a>
        </div>
    </div>
</body>

</html>
