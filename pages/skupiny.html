    <main>
        <h1 class="page-title"><i class="fas fa-layer-group"></i> Skupiny hráčov</h1>

        <div id="authGate" class="card" style="text-align:center;">
            <p class="muted">Overujem prihlásenie…</p>
        </div>

        <div id="mainContent" style="display:none;">
            <!-- Create group -->
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Vytvoriť novú skupinu</h3>

                <div class="form-row">

            <!-- Existing groups -->
            <div class="card">
                <h3><i class="fas fa-list"></i> Existujúce skupiny</h3>

                    <span class="muted">Načítavam…</span>

    <script>
        /* ===== API ===== */
        function resolveApiBase() {
            var host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://localhost:4000/api';
            }
            var raw = window.localStorage ? window.localStorage.getItem('OSK_API_BASE') : '';
            var configured = String(raw || '').trim();
            if (configured) {
                var n = configured.replace(/\/+$/, '');
                return n.endsWith('/api') ? n : n + '/api';
            }
            return '/api';
        }
        var API_BASE = resolveApiBase();
        var csrfTokenCache = null;

        async function ensureCsrfToken() {
            if (csrfTokenCache) return csrfTokenCache;
            var res = await fetch(API_BASE + '/csrf-token', { method: 'GET', credentials: 'include' });
            var data = await res.json();
            csrfTokenCache = data.csrfToken;
            return csrfTokenCache;
        }

        async function fetchSession() {
            var res = await fetch(API_BASE + '/me', { method: 'GET', credentials: 'include' });
            if (!res.ok) return null;
            var data = await res.json();
            return data.user || null;
        }

        /* ===== STATE ===== */
        var allPlayers = [];
        var groups = [];

        /* ===== PLAYER NAMES ===== */
        function toFullName(username) {
            return String(username || '')
                .replace(/[_.]/g, ' ')
                .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
        }

        /* ===== LOAD PLAYERS ===== */
        async function loadPlayers() {
            var res = await fetch(API_BASE + '/players', { method: 'GET', credentials: 'include' });
            if (!res.ok) return;
            var data = await res.json();
            allPlayers = Array.isArray(data.items) ? data.items : [];
            allPlayers.sort(function (a, b) {
                return (a.fullName || a.username).localeCompare(b.fullName || b.username, 'sk');
            });
            renderPlayerChecklist('');
        }

        function renderPlayerChecklist(filter) {
            var container = document.getElementById('playerChecklist');
            var lowerFilter = filter.toLowerCase();
            var filtered = allPlayers.filter(function (p) {
                var name = (p.fullName || p.username).toLowerCase();
                return !lowerFilter || name.includes(lowerFilter);
            });

            if (!filtered.length) {
                container.innerHTML = '<span class="muted">Žiadni hráči nenájdení.</span>';
                return;
            }

            container.innerHTML = filtered.map(function (p) {
                var displayName = p.fullName || toFullName(p.username);
                var catLabel = getCategoryLabel(p.category);
                return '<div class="player-check-item">' +
                    '<input type="checkbox" id="chk_' + p.username + '" value="' + p.username + '">' +
                    '<label for="chk_' + p.username + '">' + displayName + ' <span style="color:#888;font-size:12px;">(' + catLabel + ')</span></label>' +
                    '</div>';
            }).join('');
        }

        function getCategoryLabel(cat) {
            var labels = {
                'dospeli': 'Dospelí',
                'u19_dorast': 'U19 - Starší dorast',
                'u15_ziaci': 'U15 - Starší žiaci',
                'u13_ziaci': 'U13 - Mladší žiaci',
                'u11_pripravka': 'U11 - Prípravka',
                'u09_pripravka': 'U09 - Prípravka'
            };
            return labels[cat] || cat || '';
        }

        function getSelectedUsernames() {
            var checks = document.querySelectorAll('#playerChecklist input[type="checkbox"]:checked');
            return Array.from(checks).map(function (c) { return c.value; });
        }

        /* ===== CREATE GROUP ===== */
        async function createGroup() {
            var nameInput = document.getElementById('groupName');
            var name = nameInput.value.trim();
            var usernames = getSelectedUsernames();
            var msgDiv = document.getElementById('createMsg');

            if (!name || name.length < 2) {
                msgDiv.className = 'msg error';
                msgDiv.textContent = 'Zadaj názov skupiny (aspoň 2 znaky).';
                return;
            }
            if (!usernames.length) {
                msgDiv.className = 'msg error';
                msgDiv.textContent = 'Vyber aspoň jedného hráča.';
                return;
            }

            var btn = document.getElementById('createGroupBtn');
            btn.disabled = true;

            try {
                var csrf = await ensureCsrfToken();
                var res = await fetch(API_BASE + '/groups', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrf
                    },
                    body: JSON.stringify({ name: name, playerUsernames: usernames })
                });

                if (!res.ok) {
                    var err = await res.json().catch(function () { return {}; });
                    throw new Error(err.message || 'Nepodarilo sa vytvoriť skupinu.');
                }

                msgDiv.className = 'msg success';
                msgDiv.textContent = 'Skupina "' + name + '" bola vytvorená.';
                nameInput.value = '';
                document.querySelectorAll('#playerChecklist input[type="checkbox"]').forEach(function (c) { c.checked = false; });
                await loadGroups();
            } catch (e) {
                msgDiv.className = 'msg error';
                msgDiv.textContent = e.message || 'Chyba pri vytváraní skupiny.';
            } finally {
                btn.disabled = false;
            }
        }

        /* ===== LOAD GROUPS ===== */
        async function loadGroups() {
            var container = document.getElementById('groupsList');
            try {
                var res = await fetch(API_BASE + '/groups', { method: 'GET', credentials: 'include' });
                if (!res.ok) throw new Error('Chyba');
                var data = await res.json();
                groups = Array.isArray(data.items) ? data.items : [];
                renderGroups();
            } catch (e) {
                container.innerHTML = '<span class="muted">Nepodarilo sa načítať skupiny.</span>';
            }
        }

        function renderGroups() {
            var container = document.getElementById('groupsList');
            if (!groups.length) {
                container.innerHTML = '<span class="muted">Žiadne skupiny zatiaľ neboli vytvorené.</span>';
                return;
            }

            container.innerHTML = groups.map(function (g) {
                var members = g.playerUsernames.map(function (u) {
                    var player = allPlayers.find(function (p) { return p.username === u; });
                    var displayName = player ? (player.fullName || toFullName(u)) : toFullName(u);
                    return '<span class="member-tag">' + displayName + '</span>';
                }).join('');

                var date = new Date(g.createdAt);
                var dateStr = date.toLocaleDateString('sk-SK');

                return '<div class="group-card">' +
                    '<div class="group-card-header">' +
                    '<span class="group-card-title">' + g.name + '</span>' +
                    '<button class="btn btn-danger" onclick="deleteGroup(\'' + g.id + '\', \'' + g.name.replace(/'/g, "\\'") + '\')">' +
                    '<i class="fas fa-trash"></i> Zmazať</button>' +
                    '</div>' +
                    '<div class="group-card-meta">Vytvoril: ' + toFullName(g.createdBy) + ' | ' + dateStr + ' | ' + g.playerUsernames.length + ' hráčov</div>' +
                    '<div class="group-card-members">' + members + '</div>' +
                    '</div>';
            }).join('');
        }

        /* ===== DELETE GROUP ===== */
        async function deleteGroup(id, name) {
            if (!confirm('Naozaj chceš zmazať skupinu "' + name + '"?')) return;

            try {
                var csrf = await ensureCsrfToken();
                var res = await fetch(API_BASE + '/groups/' + id + '/delete', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrf
                    }
                });

                if (!res.ok && res.status !== 204) {
                    throw new Error('Nepodarilo sa zmazať skupinu.');
                }

                await loadGroups();
            } catch (e) {
                alert(e.message || 'Chyba pri mazaní skupiny.');
            }
        }

        /* ===== SEARCH ===== */
        document.getElementById('playerSearch').addEventListener('input', function () {
            renderPlayerChecklist(this.value);
        });

        /* ===== CREATE BUTTON ===== */
        document.getElementById('createGroupBtn').addEventListener('click', createGroup);

        /* ===== INIT ===== */
        (async function () {
            await ensureCsrfToken().catch(function () { });
            var user = await fetchSession();
            var gate = document.getElementById('authGate');
            var main = document.getElementById('mainContent');

            if (!user || (user.role !== 'coach' && user.role !== 'admin')) {
                gate.innerHTML = '<p style="color:#e74c3c;font-weight:bold;">Prístup je povolený len trénerom a administrátorom.</p>';
                return;
            }

            gate.style.display = 'none';
            main.style.display = '';
            document.getElementById('createGroupBtn').disabled = false;

            await Promise.all([loadPlayers(), loadGroups()]);
        })();
    </script>

    <!-- Scroll to top (mobile) -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Späť hore"
        title="Späť hore"
        style="display:none;position:fixed;bottom:24px;right:20px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#003399;color:#fff;border:2px solid #ffd700;box-shadow:0 4px 14px rgba(0,0,0,0.25);font-size:18px;cursor:pointer;align-items:center;justify-content:center;"><i
            class="fas fa-chevron-up"></i></button>
    <script>
        (function () {
            var btn = document.getElementById('scrollTopBtn');
            window.addEventListener('scroll', function () {
                btn.style.display = (window.innerWidth <= 768 && window.scrollY > 220) ? 'flex' : 'none';
            }, { passive: true });
        })();
    </script>
    <script>
        (function() {
            var toggle = document.getElementById('shMobileToggle');
            var nav = document.getElementById('shMainNav');
            if (toggle && nav) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = nav.classList.toggle('open');
                    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                    if (!open) {
                        nav.querySelectorAll('.sh-submenu-parent').forEach(function(p) { p.classList.remove('sh-open'); });
                    }
                });
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('#shMobileToggle') && !e.target.closest('#shMainNav')) {
                        nav.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                        nav.querySelectorAll('.sh-submenu-parent').forEach(function(p) { p.classList.remove('sh-open'); });
                    }
                });

            }
            try {
                var stored = localStorage.getItem('currentUser');
                if (stored) {
                    var user = JSON.parse(stored);
                    var name = user.username || user.name || '';
                    if (name) {
                        var btn = document.getElementById('shLoginBtn');
                        var mBtn = document.getElementById('shMobileLoginBtn');
                        if (btn) btn.textContent = name;
                        if (mBtn) mBtn.textContent = name;
                    }
                    if (user.role && user.role !== 'blogger') {
                        var trainLink = document.getElementById('shTrainingNavLink');
                        var infoLink = document.getElementById('shInfoNavLink');
                        if (trainLink) trainLink.style.display = '';
                        if (infoLink) infoLink.style.display = '';
                    }
                }
            } catch(e) {}
})();
    </script>
