    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            color: #333;
            overflow-x: hidden;
        }

        /* Unified Heading Styles */
        h1,
        h3,
        .page-title,
        .section-title {
            font-size: 30px;
            margin-bottom: 24px;
            color: #003399;
            display: flex !important;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            line-height: 1.2;
        }

        h3 {
            border-bottom: 3px solid #ffd700;
            padding-bottom: 10px;
            display: inline-flex !important;
            margin-top: 20px;
        }

        @media (max-width: 768px) {

            h1,
            h3,
            .page-title,
            .section-title {
                font-size: 26px !important;
            }
        }

        @media screen and (max-width: 480px) {

            h1,
            h3,
            .page-title,
            .section-title {
                font-size: 24px !important;
            }
        }

        main {
            max-width: 1280px;
            margin: 28px auto;
            padding: 0 18px 28px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            border: 1px solid #eee;
        }

        .table-wrap {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #e6ebf3;
            margin-bottom: 10px;
        }

        /* Standings & Squad Tables */
        .standings-table,
        .squad-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            table-layout: auto;
        }

        .standings-table thead tr,
        .squad-table thead tr {
            background: #f8fbff;
            border-bottom: 2px solid #eef4ff;
        }

        .standings-table th,
        .squad-table th {
            padding: 12px 15px;
            text-align: left;
            font-size: 11px;
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .standings-table td,
        .squad-table td {
            padding: 14px 15px;
            border-bottom: 1px solid #f0f4f8;
            font-size: 14px;
            color: #333;
        }

        .standings-table tr:hover,
        .squad-table tr:hover {
            background: #f9fbff;
        }

        .standings-rank-cell {
            width: 50px;
            font-weight: 800;
            color: #003399;
        }

        .standings-table th.center,
        .standings-table td.center,
        .squad-table th.center,
        .squad-table td.center {
            text-align: center;
            width: 34px !important;
        }


        .standings-team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .standings-team-abbr {
            width: 30px;
            height: 30px;
            background: #003399;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 10px;
            flex-shrink: 0;
        }

        .standings-team-abbr.own-team {
            background: #ffd700;
            color: #003399;
        }

        .standings-points {
            font-weight: 800;
            color: #003399;
            background: #f4f8ff;
        }

        /* Mobile roster keeps all desktop columns available via horizontal scroll */
        @media (max-width: 480px) {
            .table-wrap {
                overflow-x: auto;
                border-radius: 8px;
            }

            .standings-table th,
            .standings-table td,
            .squad-table th,
            .squad-table td {
                padding: 8px 3px !important;
                font-size: 11px;
                width: auto !important; /* Allow columns to shrink on mobile */
            }

            .standings-table,
            .squad-table {
                min-width: 480px !important; /* Reduced from 720px to bring variables closer */
            }

            .standings-team-name,
            .player-name {
                max-width: 100px !important;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .standings-rank-cell,
            .squad-num {
                width: 28px !important;
            }

            .standings-team-abbr {
                width: 24px;
                height: 24px;
                font-size: 8px;
            }
        }

        .squad-table {
            min-width: 720px;
        }

        .standings-group-header {
            font-size: 13px;
            font-weight: 700;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .standings-legend {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .standings-legend-dot {
            width: 10px;
            height: 10px;
            background: #003399;
            border-radius: 2px;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" data-cloudinary-id="OŠKKP_logo">

<body>
    <script src="/assets/js/session.js"></script>
    <script src="/assets/js/header.js"></script>
    <div id="site-header-root"></div>

    <main>
        <h1 class="page-title"><i class="fas fa-shield-alt"></i> A-tím</h1>


        <section class="card">
            <h3>Súpiska hráčov</h3>
            <div id="rosterContainer">
                <p style="color:#888;text-align:center;padding:24px 0;"><i class="fas fa-spinner fa-spin"></i> Načítavam
                    súpisku...</p>
            </div>
        </section>

        <section class="card">
            <h3>Realizačný tím</h3>
            <div id="crewContainer">
                <p style="color:#888;"><i class="fas fa-spinner fa-spin"></i> Načítavam...</p>
            </div>
        </section>

    </main>

    <script>
        const API_BASE = window.OSKSession ? window.OSKSession.getApiBase() : '/api';

        /* ===== 4-HOUR CACHE HELPER ===== */
        const CACHE_TTL = 4 * 60 * 60 * 1000;
        async function cachedFetch(cacheKey, url, options) {
            try {
                const raw = localStorage.getItem(cacheKey);
                if (raw) {
                    const cached = JSON.parse(raw);
                    if (cached && cached.ts && (Date.now() - cached.ts < CACHE_TTL)) {
                        return cached.data;
                    }
                }
            } catch (_) { }
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data })); } catch (_) { }
            return data;
        }

        const POSITION_ORDER = ['Brankár', 'Obranca', 'Záložník', 'Útočník', 'Neznáma'];
        const POSITION_LABELS = {
            'Brankár': 'BRANKÁRI',
            'Obranca': 'OBRANCOVIA',
            'Záložník': 'ZÁLOŽNÍCI',
            'Útočník': 'ÚTOČNÍCI',
            'Neznáma': 'OSTATNÍ'
        };

        function renderPositionGroup(label, players) {
            if (!players || players.length === 0) return '';
            const rows = players.map(p => {
                const s = p.stats || {};
                return `
                    <tr>
                        <td class="squad-num">${p.number || '—'}</td>
                        <td style="font-weight:700; color:#003399;">${p.captain ? 'ⓒ ' : ''}${p.name}</td>
                        <td style="text-align:center;">${s.matches ?? '—'}</td>
                        <td style="text-align:center;">${s.goals ?? '—'}</td>
                        <td style="text-align:center;">${s.minutes ?? '—'}</td>
                        <td style="text-align:center;">${s.yellowCards ?? '—'}</td>
                        <td style="text-align:center;">${s.redCards ?? '—'}</td>
                    </tr>`;
            }).join('');

            return `
                <div class="group">
                    <h4>${label}</h4>
                    <div class="table-wrap">
                        <table class="squad-table">
                            <thead>
                                <tr>
                                    <th style="width:60px; text-align:center;">#</th>
                                    <th>Meno hráča</th>
                                    <th style="width:90px;"><i class="fas fa-running" title="Zápasy"></i> Záp.</th>
                                    <th style="width:80px;"><i class="fas fa-futbol" title="Góly"></i> Góly</th>
                                    <th style="width:100px;"><i class="far fa-clock" title="Minúty"></i> Min.</th>
                                    <th style="width:60px; text-align:center;"><span title="Žlté karty" style="color:#e8b500; font-size:18px;">&#9632;</span></th>
                                    <th style="width:60px; text-align:center;"><span title="Červené karty" style="color:#d00; font-size:18px;">&#9632;</span></th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderCrew(crew) {
            if (!crew || crew.length === 0) {
                return '<p style="color:#888;">Žiadni členovia realizačného tímu.</p>';
            }
            return crew.map(c => {
                let name = c.name;
                // Client-side override to ensure correct name appears
                if (name.includes('Strhár') || name.includes('Strhar')) {
                    name = 'Juraj Ihnatišin';
                }
                return `<p>${name}</p>`;
            }).join('');
        }

        async function loadPlayers() {
            const rosterEl = document.getElementById('rosterContainer');
            const crewEl = document.getElementById('crewContainer');

            try {
                const payload = await cachedFetch(
                    'osk_atim_players_v2',
                    `${API_BASE}/sportsnet/players?team=dospeli`,
                    { method: 'GET', headers: { Accept: 'application/json' } }
                );
                const team = payload.teams && payload.teams.dospeli;

                if (!team) {
                    rosterEl.innerHTML = '<p style="color:#888;text-align:center;padding:24px 0;">Žiadni hráči neboli nájdení.</p>';
                    crewEl.innerHTML = '<p style="color:#888;">Žiadni členovia realizačného tímu.</p>';
                    return;
                }

                // Získaj playersByPosition – buď priamo z API, alebo zostaviť z players[]
                let playersByPosition = team.playersByPosition;

                if (!playersByPosition || Object.keys(playersByPosition).length === 0) {
                    // Fallback: zostaviť skupiny podľa pozície z flat players[] (rovnaká logika ako akadémia)
                    playersByPosition = {};
                    POSITION_ORDER.forEach(pos => { playersByPosition[pos] = []; });
                    const allPlayers = Array.isArray(team.players) ? team.players : [];
                    allPlayers.forEach(p => {
                        const pos = p.position || 'Neznáma';
                        const bucket = POSITION_ORDER.includes(pos) ? pos : 'Neznáma';
                        if (!playersByPosition[bucket]) playersByPosition[bucket] = [];
                        playersByPosition[bucket].push(p);
                    });
                }

                let html = '';
                POSITION_ORDER.forEach(pos => {
                    const players = playersByPosition[pos];
                    if (players && players.length > 0) {
                        html += renderPositionGroup(POSITION_LABELS[pos], players);
                    }
                });

                rosterEl.innerHTML = html || '<p style="color:#888;text-align:center;">Žiadni hráči.</p>';
                crewEl.innerHTML = renderCrew(team.crew);
            } catch (error) {
                console.warn('Nepodarilo sa načítať hráčov:', error);
                rosterEl.innerHTML = '<p style="color:#c00;text-align:center;padding:24px 0;"><i class="fas fa-exclamation-triangle"></i> Nepodarilo sa načítať súpisku.</p>';
                crewEl.innerHTML = '<p style="color:#c00;"><i class="fas fa-exclamation-triangle"></i> Nepodarilo sa načítať realizačný tím.</p>';
            }
        }

        window.addEventListener('load', async () => {
            if (window.OSKSession) {
                await window.OSKSession.syncCurrentUserFromSession();
            }
            loadPlayers();
        });
    </script>



    <div id="site-footer-root"></div>
    <script src="/assets/js/footer.js"></script>
</body>
