            <div id="leagueTableContainer">

                    tabuľku...</p>

        <script>
            function resolveApiBase() {
                const host = window.location.hostname;
                if (host === 'localhost' || host === '127.0.0.1') {
                    return 'http://localhost:4000/api';
                }
                const configuredRaw = window.localStorage ? window.localStorage.getItem('OSK_API_BASE') : '';
                const configured = String(configuredRaw || '').trim();
                if (configured) {
                    const normalized = configured.replace(/\/+$/, '');
                    return normalized.endsWith('/api') ? normalized : `${normalized}/api`;
                }
                return '/api';
            }

            const API_BASE = resolveApiBase();

            /* ===== 4-HOUR CACHE HELPER ===== */
            const CACHE_TTL = 4 * 60 * 60 * 1000;
            async function cachedFetch(cacheKey, url, options) {
                try {
                    const raw = localStorage.getItem(cacheKey);
                    if (raw) {
                        const cached = JSON.parse(raw);
                        if (cached && cached.ts && (Date.now() - cached.ts < CACHE_TTL)) {
                            return cached.data;
                        }
                    }
                } catch (_) { }
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data })); } catch (_) { }
                return data;
            }

            const POSITION_ORDER = ['Brankár', 'Obranca', 'Záložník', 'Útočník', 'Neznáma'];
            const POSITION_LABELS = {
                'Brankár': 'BRANKÁRI',
                'Obranca': 'OBRANCOVIA',
                'Záložník': 'ZÁLOŽNÍCI',
                'Útočník': 'ÚTOČNÍCI',
                'Neznáma': 'OSTATNÍ'
            };

            function renderPositionGroup(label, players) {
                if (!players || players.length === 0) return '';
                const rows = players.map(p => {
                    const s = p.stats || {};
                    return `
                <tr>
                    <td>${p.number || '—'}</td>
                    <td>${p.captain ? 'ⓒ ' : ''}${p.name}</td>
                    <td>${s.matches ?? '—'}</td>
                    <td>${s.goals ?? '—'}</td>
                    <td>${s.minutes ?? '—'}</td>
                    <td>${s.yellowCards ?? '—'}</td>
                    <td>${s.redCards ?? '—'}</td>
                </tr>
            `;
                }).join('');

                return `
                <div class="group">
                    <h4>${label}</h4>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:50px;">#</th>
                                    <th>Meno hráča</th>
                                    <th style="width:70px;"><i class="fas fa-futbol" title="Zápasy"></i> Záp.</th>
                                    <th style="width:60px;"><i class="fas fa-futbol" title="Góly"></i> Góly</th>
                                    <th style="width:70px;"><i class="far fa-clock" title="Minúty"></i> Min.</th>
                                    <th style="width:50px;"><span title="Žlté karty" style="color:#e8b500;">&#9632;</span></th>
                                    <th style="width:50px;"><span title="Červené karty" style="color:#d00;">&#9632;</span></th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
            }

            function renderCrew(crew) {
                if (!crew || crew.length === 0) {
                    return '<p style="color:#888;">Žiadni členovia realizačného tímu.</p>';
                }
                return crew.map(c => {
                    let name = c.name;
                    // Client-side override to ensure correct name appears
                    if (name.includes('Strhár') || name.includes('Strhar')) {
                        name = 'Juraj Ihnatišin';
                    }
                    return `<p>${name}</p>`;
                }).join('');
            }   

            async function loadPlayers() {
                const rosterEl = document.getElementById('rosterContainer');
                const crewEl = document.getElementById('crewContainer');

                try {
                    const payload = await cachedFetch(
                        'osk_atim_players',
                        `${API_BASE}/sportsnet/players?team=dospeli`,
                        { method: 'GET', headers: { Accept: 'application/json' } }
                    );
                    const team = payload.teams && payload.teams.dospeli;

                    if (!team || !team.playersByPosition) {
                        rosterEl.innerHTML = '<p style="color:#888;text-align:center;padding:24px 0;">Žiadni hráči neboli nájdení.</p>';
                        crewEl.innerHTML = '<p style="color:#888;">Žiadni členovia realizačného tímu.</p>';
                        return;
                    }

                    let html = '';
                    POSITION_ORDER.forEach(pos => {
                        const players = team.playersByPosition[pos];
                        if (players && players.length > 0) {
                            html += renderPositionGroup(POSITION_LABELS[pos], players);
                        }
                    });

                    rosterEl.innerHTML = html || '<p style="color:#888;text-align:center;">Žiadni hráči.</p>';
                    crewEl.innerHTML = renderCrew(team.crew);
                } catch (error) {
                    console.warn('Nepodarilo sa načítať hráčov:', error);
                    rosterEl.innerHTML = '<p style="color:#c00;text-align:center;padding:24px 0;"><i class="fas fa-exclamation-triangle"></i> Nepodarilo sa načítať súpisku.</p>';
                    crewEl.innerHTML = '<p style="color:#c00;"><i class="fas fa-exclamation-triangle"></i> Nepodarilo sa načítať realizačný tím.</p>';
                }
            }

            const IDX_OWN_TEAM = ['kamenná poruba', 'kamenna poruba', 'ošk kamen', 'osk kamen'];
            function idxIsOwnTeam(name) {
                const l = String(name || '').toLowerCase();
                return IDX_OWN_TEAM.some(p => l.includes(p));
            }

            function detectStandingsCategory(competition, part) {
                const text = `${competition} ${part}`.toLowerCase();
                if (text.includes('dorast') || text.includes('u19') || text.includes('u17')) return 'dorast';
                if (text.includes('žiac') || text.includes('ziac') || text.includes('u15') || text.includes('u13')) return 'ziaci';
                if (text.includes('príprav') || text.includes('priprav') || text.includes('u11') || text.includes('u09') || text.includes('u9') || text.includes('respect')) return 'pripravka';
                return 'dospeli';
            }

            async function loadLeagueTable() {
                const container = document.getElementById('leagueTableContainer');
                if (!container) return;

                try {
                    const res = await fetch(`${API_BASE}/sportsnet/standings`, {
                        headers: { Accept: 'application/json' }
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const payload = await res.json();
                    const groups = Array.isArray(payload.standings) ? payload.standings : [];

                    const ownGroups = groups.filter(g =>
                        detectStandingsCategory(g.competition, g.part) === 'dospeli' &&
                        (g.results || []).some(t => idxIsOwnTeam(t.teamName || t.name))
                    );

                    if (ownGroups.length === 0) {
                        container.innerHTML = '<p style="text-align:center;color:#666;padding:20px;">Žiadna tabuľka pre túto kategóriu.</p>';
                        return;
                    }

                    container.innerHTML = ownGroups.map(group => {
                        const teams = group.results || [];
                        const title = group.part && group.part !== group.competition
                            ? `${group.competition} – ${group.part}`
                            : group.competition;

                        const rows = teams.map((team, idx) => {
                            const rank = team.rank ?? idx + 1;
                            const name = team.teamName || team.name || 'Tím';
                            const diff = (team.goalsFor || 0) - (team.goalsAgainst || 0);
                            const diffStr = diff > 0 ? `+${diff}` : String(diff);
                            const diffCls = diff > 0 ? 'standings-diff-pos' : (diff < 0 ? 'standings-diff-neg' : '');
                            const own = idxIsOwnTeam(name);

                            return `
                                <tr style="${own ? 'background: #f0f5ff;' : ''}">
                                    <td class="standings-rank-cell">
                                        <span class="standings-rank">${rank}.</span>
                                    </td>
                                    <td>
                                        <div class="standings-team-cell">
                                            <span class="standings-team-name${own ? ' own-team' : ''}">${name}</span>
                                        </div>
                                    </td>
                                    <td class="center">${team.played ?? 0}</td>
                                    <td class="center">${team.won ?? 0}</td>
                                    <td class="center">${team.drawn ?? 0}</td>
                                    <td class="center">${team.lost ?? 0}</td>
                                    <td class="center">${team.goalsFor ?? 0}:${team.goalsAgainst ?? 0}</td>
                                    <td class="center"><span class="${diffCls}">${diffStr}</span></td>
                                    <td class="center"><span class="standings-points">${team.points ?? 0}</span></td>
                                </tr>`;
                        }).join('');

                        return `
                            <div class="standings-group">
                                <div class="standings-group-header"><i class="fas fa-table-cells"></i> ${title}</div>
                                <div class="table-wrap" style="border:none; border-radius:0;">
                                    <table class="standings-table">
                                        <thead>
                                            <tr>
                                                <th class="standings-rank-cell">#</th>
                                                <th>Tím</th>
                                                <th class="center">OZ</th>
                                                <th class="center">V</th>
                                                <th class="center">R</th>
                                                <th class="center">P</th>
                                                <th class="center">Góly</th>
                                                <th class="center">+/-</th>
                                                <th class="center">B</th>
                                            </tr>
                                        </thead>
                                        <tbody>${rows}</tbody>
                                    </table>
                                </div>
                            </div>`;
                    }).join('');

                } catch (error) {
                    console.error("Nepodarilo sa načítať tabuľku:", error);
                    container.innerHTML = `<p style="color:#c00;text-align:center;padding:24px 0;"><i class="fas fa-exclamation-triangle"></i> Nepodarilo sa načítať ligovú tabuľku.</p>`;
                }
            }

            window.addEventListener('load', () => {
                loadPlayers();
                loadLeagueTable();
            });
        </script>

        <!-- Scroll to top (mobile) -->
        <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Späť hore"
            title="Späť hore"
            style="display:none;position:fixed;bottom:24px;right:20px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#003399;color:#fff;border:2px solid #ffd700;box-shadow:0 4px 14px rgba(0,0,0,0.25);font-size:18px;cursor:pointer;align-items:center;justify-content:center;"><i
                class="fas fa-chevron-up"></i></button>
        <script>
            (function () {
                var btn = document.getElementById('scrollTopBtn');
                window.addEventListener('scroll', function () {
                    btn.style.display = (window.innerWidth <= 768 && window.scrollY > 220) ? 'flex' : 'none';
                }, { passive: true });
            })();
        </script>
    <script>
        (function() {
            var toggle = document.getElementById('shMobileToggle');
            var nav = document.getElementById('shMainNav');
            if (toggle && nav) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = nav.classList.toggle('open');
                    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                });
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('#shMobileToggle') && !e.target.closest('#shMainNav')) {
                        nav.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                    }
                });
            }
            try {
                var stored = localStorage.getItem('currentUser');
                if (stored) {
                    var user = JSON.parse(stored);
                    var name = user.username || user.name || '';
                    if (name) {
                        var btn = document.getElementById('shLoginBtn');
                        var mBtn = document.getElementById('shMobileLoginBtn');
                        if (btn) btn.textContent = name;
                        if (mBtn) mBtn.textContent = name;
                    }
                }
            } catch(e) {}
        })();
    </script>
</body>

</html>
