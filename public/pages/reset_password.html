<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obnova hesla | OŠK Kamenná Poruba</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" data-cloudinary-id="OŠKKP_logo">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #24304d;
            background: linear-gradient(135deg, #eef4ff 0%, #f8f9fb 50%, #e6ecf7 100%);
        }

        .reset-shell {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px 48px;
        }

        .reset-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 35, 102, 0.14);
            border: 1px solid rgba(0, 51, 153, 0.08);
            padding: 30px 26px;
        }

        .reset-badge {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #003399;
            color: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 18px;
            box-shadow: 0 10px 22px rgba(0, 51, 153, 0.2);
        }

        h1 {
            margin: 0 0 10px;
            color: #003399;
            font-size: 30px;
            line-height: 1.15;
        }

        .intro {
            margin: 0 0 22px;
            font-size: 15px;
            line-height: 1.6;
            color: #53627c;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #003399;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #ccd5e3;
            font-size: 15px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #003399;
            box-shadow: 0 0 0 3px rgba(0, 51, 153, 0.12);
        }

        .status {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .status.visible {
            display: block;
        }

        .status.success {
            background: rgba(46, 160, 67, 0.12);
            border: 1px solid #2ea043;
            color: #166534;
        }

        .status.error {
            background: rgba(231, 76, 60, 0.08);
            border: 1px solid #e74c3c;
            color: #b42318;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #003399;
            color: #fff;
            box-shadow: 0 10px 24px rgba(0, 51, 153, 0.18);
        }

        .btn-secondary {
            background: #edf2ff;
            color: #003399;
        }

        @keyframes loginSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .muted {
            margin-top: 18px;
            font-size: 13px;
            line-height: 1.5;
            color: #66758e;
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 24px 18px;
                border-radius: 16px;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <script src="/assets/js/session.js"></script>
    <script src="/assets/js/header.js"></script>
    <div id="site-header-root"></div>

    <main class="reset-shell">
        <section class="reset-card">
            <div class="reset-badge"><i class="fas fa-key"></i></div>
            <h1>Nastavenie nového hesla</h1>
            <p class="intro">Zadajte nové heslo pre svoj klubový účet. Odkaz z emailu je jednorazový a po použití sa automaticky zneplatní.</p>

            <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
                <div class="form-group">
                    <label for="newPassword">Nové heslo</label>
                    <input id="newPassword" type="password" minlength="8" placeholder="Minimálne 8 znakov" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Potvrdiť nové heslo</label>
                    <input id="confirmPassword" type="password" minlength="8" placeholder="Zopakujte nové heslo" required>
                </div>
                <div id="resetStatus" class="status" role="status" aria-live="polite"></div>
                <div class="actions">
                    <button id="resetSubmitBtn" type="submit" class="btn btn-primary">
                        <span id="resetSubmitSpinner" style="display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.45);border-top-color:#fff;border-radius:50%;animation:loginSpin 0.8s linear infinite;"></span>
                        <span id="resetSubmitText">Uložiť nové heslo</span>
                    </button>
                    <a class="btn btn-secondary" href="/">Späť na hlavnú stránku</a>
                </div>
            </form>

            <p class="muted">Ak nemáte prístup k emailu priradenému k účtu, kontaktujte administrátora klubu.</p>
        </section>
    </main>

    <div id="site-footer-root"></div>
    <script src="/assets/js/footer.js"></script>

    <script>
        const API_BASE = window.OSKSession ? window.OSKSession.getApiBase() : '/api';

        function getResetToken() {
            return new URLSearchParams(window.location.search).get('token') || '';
        }

        async function ensureCsrfToken() {
            if (window.OSKSession) {
                return window.OSKSession.ensureCsrfToken();
            }

            const response = await fetch(`${API_BASE}/csrf-token`, {
                method: 'GET',
                credentials: 'include'
            });
            const payload = await response.json().catch(() => ({}));
            return payload.csrfToken || '';
        }

        function setStatus(message, type) {
            const status = document.getElementById('resetStatus');
            if (!status) {
                return;
            }

            status.className = 'status';
            status.textContent = message || '';
            if (!message) {
                return;
            }

            status.classList.add('visible');
            status.classList.add(type === 'error' ? 'error' : 'success');
        }

        function setLoading(isLoading) {
            const button = document.getElementById('resetSubmitBtn');
            const spinner = document.getElementById('resetSubmitSpinner');
            const text = document.getElementById('resetSubmitText');

            if (button) {
                button.disabled = isLoading;
                button.style.opacity = isLoading ? '0.85' : '1';
            }

            if (spinner) {
                spinner.style.display = isLoading ? 'inline-block' : 'none';
            }

            if (text) {
                text.textContent = isLoading ? 'Ukladám...' : 'Uložiť nové heslo';
            }
        }

        async function handleResetPassword(event) {
            event.preventDefault();

            const token = getResetToken();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!token) {
                setStatus('V odkaze chýba reset token. Požiadajte o nový email na obnovu hesla.', 'error');
                return;
            }

            if (newPassword.length < 8) {
                setStatus('Nové heslo musí mať aspoň 8 znakov.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                setStatus('Heslá sa nezhodujú.', 'error');
                return;
            }

            setLoading(true);
            setStatus('');

            try {
                const csrfToken = await ensureCsrfToken();
                const response = await fetch(`${API_BASE}/reset-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrfToken
                    },
                    body: JSON.stringify({
                        token,
                        newPassword
                    })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(payload.message || 'Nepodarilo sa uložiť nové heslo.');
                }

                setStatus(payload.message || 'Heslo bolo úspešne obnovené. Môžete sa prihlásiť.', 'success');
                document.getElementById('resetPasswordForm').reset();

                try {
                    sessionStorage.setItem('osk-open-login-modal', '1');
                } catch (_) {
                    // Ignore storage issues.
                }

                window.setTimeout(function () {
                    window.location.href = '/';
                }, 1400);
            } catch (error) {
                setStatus(error.message || 'Nepodarilo sa uložiť nové heslo.', 'error');
            } finally {
                setLoading(false);
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (!getResetToken()) {
                const button = document.getElementById('resetSubmitBtn');
                if (button) {
                    button.disabled = true;
                }
                setStatus('Tento odkaz je neplatný alebo neúplný. Požiadajte o nový email na obnovu hesla.', 'error');
            }
        });
    </script>
</body>

</html>
