<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | OŠK Kamenná Poruba</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P152RNBL34"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            color: #333;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        h1,
        .page-title,
        .topbar h1 {
            margin: 0;
            color: #003399;
            font-size: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media screen and (max-width: 768px) {

            h1,
            .page-title,
            .topbar h1 {
                font-size: 26px !important;
            }
        }

        @media screen and (max-width: 480px) {

            h1,
            .page-title,
            .topbar h1 {
                font-size: 24px !important;
            }
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-back {
            background: #f4f4f4;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-primary {
            background: #003399;
            color: #fff;
        }

        .btn-danger {
            background: #fff;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .btn-danger:hover {
            background: #e74c3c;
            color: #fff;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .card h2 {
            margin: 0 0 15px;
            color: #003399;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        input:not([type="checkbox"]),
        textarea,
        select {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            color: #333;
            padding: 12px;
            font-family: inherit;
            font-size: 15px;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        .file-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-field-label {
            font-size: 14px;
            font-weight: 700;
            color: #003399;
        }

        .selected-image-preview {
            display: none;
            width: 100%;
            max-width: 420px;
            max-height: 260px;
            object-fit: contain;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #f7f7f7;
            padding: 8px;
        }

        .selected-image-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .selected-image-name {
            font-size: 14px;
            color: #555;
        }

        .post-preview-image {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 10px;
            margin: 14px 0;
            border: 1px solid #ddd;
            background: #f2f2f2;
        }

        .post {
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #fff;
            padding: 20px 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.15s;
        }

        .post:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
            border-color: #003399;
        }

        .post h3 {
            margin: 0 0 10px;
            color: #003399;
            font-size: 22px;
        }

        .meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #333;
        }

        .excerpt {
            color: #444;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .btn-ghost {
            background: #fff;
            color: #003399;
            border: 1px solid #003399;
        }

        .btn-ghost:hover {
            background: #003399;
            color: #fff;
        }

        /* Posts grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .posts-grid { grid-template-columns: 1fr; }
        }

        .post-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s, transform 0.15s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .post-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            transform: translateY(-3px);
            border-color: #003399;
        }

        .post-card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #e8edf5;
        }

        .post-card-image-placeholder {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #e8edf5 0%, #d0d8ee 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aab;
            font-size: 32px;
        }

        .post-card-body {
            padding: 14px 16px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .post-card-title {
            margin: 0;
            color: #003399;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
        }

        .post-card-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
            padding-top: 6px;
        }

        .view-count {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            color: #aaa;
        }

        .post-card-actions {
            display: flex;
            gap: 6px;
            padding: 8px 12px 12px;
            border-top: 1px solid #f0f0f0;
        }

        /* Featured section */
        .featured-section {
            margin-bottom: 28px;
        }

        .featured-section-title {
            font-size: 14px;
            font-weight: 700;
            color: #856404;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .featured-badge {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .post-tag {
            background: #eee;
            color: #555;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        #composerCard {
            display: none;
        }

        /* Standardized Compact Footer */
        #site-footer-root {
            margin-top: 50px;
        }

        .muted {
            color: #777;
            font-size: 14px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 5px;
        }

        .tag-tab {
            padding: 8px 18px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .tag-tab:hover {
            border-color: #003399;
            color: #003399;
            background: rgba(0, 51, 153, 0.05);
        }

        .tag-tab.active {
            background: #003399;
            color: #fff;
            border-color: #003399;
            box-shadow: 0 4px 10px rgba(0, 51, 153, 0.2);
        }

        .post-tag {
            background: #eee;
            color: #555;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        #composerCard {
            display: none;
        }

        /* Standardized Compact Footer */
        #site-footer-root {
            margin-top: 50px;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" data-cloudinary-id="OŠKKP_logo">
</head>

<body>
    <script src="/assets/js/session.js"></script>
    <script src="/assets/js/header.js"></script>
    <div id="site-header-root"></div>

    <div class="container">
        <div class="topbar">
            <h1><i class="fas fa-blog"></i> Klubový blog</h1>
        </div>

        <div id="composerCard" class="card">
            <h2 id="composerHeading"><i class="fas fa-pen"></i> Nový blog príspevok</h2>
            <div class="form-grid">
                <input id="postTitle" placeholder="Nadpis príspevku" maxlength="200" />
                <textarea id="postContent" placeholder="Obsah príspevku"></textarea>
                <div>
                    <label class="file-field-label"
                        style="font-size:14px;font-weight:700;color:#003399;display:block;margin-bottom:6px;"
                        for="postTag">Kategória príspevku</label>
                    <select id="postTag">
                        <option value="">— Bez kategórie —</option>
                        <option value="Rozhovory">Rozhovory</option>
                        <option value="Paľove Futbaloviny">Paľove Futbaloviny</option>
                    </select>
                </div>
                <div class="file-field">
                    <label class="file-field-label" for="postImage">Fotografia k príspevku</label>
                    <input id="postImage" type="file" accept="image/*" onchange="handlePostImageSelection(event)" />
                    <div class="selected-image-row">
                        <img id="postImagePreview" class="selected-image-preview" alt="Náhľad vybranej fotografie" />
                        <div id="postImageName" class="selected-image-name muted">Bez vybratej fotografie.</div>
                        <button id="postImageClear" class="btn btn-back" type="button"
                            onclick="clearSelectedPostImage()" style="display:none;">
                            <i class="fas fa-times"></i> Odobrať fotku
                        </button>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <input id="postFeatured" type="checkbox" style="width:auto;accent-color:#003399;cursor:pointer;" />
                    <label for="postFeatured" style="font-size:14px;font-weight:700;color:#003399;cursor:pointer;">
                        <i class="fas fa-thumbtack"></i> Pripnúť článok (zobrazí sa hore)
                    </label>
                </div>
                <div>
                    <button id="composerSubmitButton" class="btn btn-primary" type="button" onclick="savePost()">
                        <i class="fas fa-plus"></i> Pridať príspevok
                    </button>
                    <button id="composerCancelButton" class="btn btn-back" type="button" onclick="resetComposer()"
                        style="display:none;">
                        <i class="fas fa-times"></i> Zrušiť úpravu
                    </button>
                </div>
                <div id="composerMessage" class="muted"></div>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <h2 style="margin:0;"><i class="fas fa-newspaper"></i> Príspevky</h2>
                <div id="blogRoleInfo" class="muted"></div>
            </div>
            <div id="tagFilters" class="tag-tabs" style="margin-top: 20px;"></div>
            <div id="featuredSection" class="featured-section" style="display:none;">
                <div class="featured-section-title"><i class="fas fa-thumbtack"></i> Pripnuté články</div>
                <div id="featuredContainer" class="posts-grid"></div>
                <hr style="border:none;border-top:1px solid #eee;margin:24px 0 0;" />
            </div>
            <div id="postsContainer" class="posts-grid"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.OSKSession ? window.OSKSession.getApiBase() : '/api';
        const PREDEFINED_TAGS = ['Rozhovory', 'Paľove Futbaloviny'];
        let currentUser = { username: null, role: null, playerCategory: null, isLoggedIn: false };
        let manageItems = [];
        let currentTagFilter = 'Všetky';
        let selectedPostImageFile = null;
        let composerImageUrl = null;
        let editingPostId = null;

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Neznámy dátum';
            return date.toLocaleDateString('sk-SK', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function renderTagFilters(posts) {
            const container = document.getElementById('tagFilters');
            if (!container) return;

            const tags = new Set(['Všetky']);
            PREDEFINED_TAGS.forEach((tag) => tags.add(tag));
            posts.forEach((post) => {
                if (post.tags && post.tags.length > 0) {
                    post.tags.forEach((tag) => tags.add(tag));
                }
            });

            container.innerHTML = Array.from(tags).map((tag) => `
                <div class="tag-tab ${currentTagFilter === tag ? 'active' : ''}" onclick="filterByTag('${escapeHtml(tag)}')">
                    ${escapeHtml(tag)}
                </div>
            `).join('');
        }

        function filterByTag(tag) {
            currentTagFilter = tag;
            const orderedPosts = window.__blogPostsById ? Array.from(window.__blogPostsById.values()).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)) : [];
            renderTagFilters(orderedPosts);
            renderPosts(orderedPosts);
        }

        function updateComposerUi() {
            const heading = document.getElementById('composerHeading');
            const submitButton = document.getElementById('composerSubmitButton');
            const cancelButton = document.getElementById('composerCancelButton');

            if (heading) {
                heading.innerHTML = editingPostId
                    ? '<i class="fas fa-edit"></i> Upraviť blog príspevok'
                    : '<i class="fas fa-pen"></i> Nový blog príspevok';
            }
            if (submitButton) {
                submitButton.innerHTML = editingPostId
                    ? '<i class="fas fa-save"></i> Uložiť zmeny'
                    : '<i class="fas fa-plus"></i> Pridať príspevok';
            }
            if (cancelButton) {
                cancelButton.style.display = editingPostId ? 'inline-flex' : 'none';
            }
        }

        function renderComposerImagePreview(messageText) {
            const input = document.getElementById('postImage');
            const preview = document.getElementById('postImagePreview');
            const name = document.getElementById('postImageName');
            const clearButton = document.getElementById('postImageClear');

            if (!selectedPostImageFile && input) input.value = '';

            if (selectedPostImageFile) {
                if (preview) {
                    const objectUrl = URL.createObjectURL(selectedPostImageFile);
                    preview.src = objectUrl;
                    preview.style.display = 'block';
                    preview.onload = function () { URL.revokeObjectURL(objectUrl); };
                }
                if (name) name.textContent = `${selectedPostImageFile.name} (${Math.max(1, Math.round(selectedPostImageFile.size / 1024))} KB)`;
                if (clearButton) clearButton.style.display = 'inline-flex';
                return;
            }

            if (composerImageUrl) {
                if (preview) { preview.src = composerImageUrl; preview.style.display = 'block'; }
                if (name) name.textContent = 'Aktuálna fotografia príspevku.';
                if (clearButton) clearButton.style.display = 'inline-flex';
                return;
            }

            if (preview) { preview.removeAttribute('src'); preview.style.display = 'none'; }
            if (name) name.textContent = messageText || 'Bez vybratej fotografie.';
            if (clearButton) clearButton.style.display = 'none';
        }

        function clearSelectedPostImage() {
            selectedPostImageFile = null;
            composerImageUrl = null;
            renderComposerImagePreview();
        }

        function resetComposer(options = {}) {
            editingPostId = null;
            selectedPostImageFile = null;
            composerImageUrl = null;

            const titleInput = document.getElementById('postTitle');
            const contentInput = document.getElementById('postContent');
            const message = document.getElementById('composerMessage');
            const tagSelect = document.getElementById('postTag');
            const featuredCheck = document.getElementById('postFeatured');

            if (titleInput) titleInput.value = '';
            if (contentInput) contentInput.value = '';
            if (tagSelect) tagSelect.value = '';
            if (featuredCheck) featuredCheck.checked = false;

            renderComposerImagePreview();
            if (message && !options.keepMessage) message.textContent = '';
            updateComposerUi();
        }

        function canManagePost(post) {
            if (!currentUser) return false;
            if (currentUser.role === 'admin') return true;
            return ['blogger', 'coach'].includes(currentUser.role) && post.createdBy === currentUser.username;
        }

        function startEditPost(id) {
            const post = window.__blogPostsById && window.__blogPostsById.get(id);
            if (!post || !canManagePost(post)) return;

            editingPostId = id;
            selectedPostImageFile = null;
            composerImageUrl = post.imageUrl || null;

            const titleInput = document.getElementById('postTitle');
            const contentInput = document.getElementById('postContent');
            const tagSelect = document.getElementById('postTag');
            const featuredCheck = document.getElementById('postFeatured');
            const message = document.getElementById('composerMessage');
            const composer = document.getElementById('composerCard');

            if (titleInput) titleInput.value = post.title || '';
            if (contentInput) contentInput.value = post.content || '';
            if (tagSelect) tagSelect.value = Array.isArray(post.tags) && post.tags.length > 0 ? post.tags[0] : '';
            if (featuredCheck) featuredCheck.checked = Boolean(post.featured);

            renderComposerImagePreview();
            updateComposerUi();
            if (message) message.textContent = `Upravujete príspevok: ${post.title}`;
            if (composer) composer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function handlePostImageSelection(event) {
            const file = event && event.target && event.target.files ? event.target.files[0] : null;
            const message = document.getElementById('composerMessage');

            if (!file) { selectedPostImageFile = null; renderComposerImagePreview(); return; }

            if (!file.type || !file.type.startsWith('image/')) {
                selectedPostImageFile = null;
                renderComposerImagePreview();
                if (message) message.textContent = 'Vybraný súbor nie je obrázok.';
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                selectedPostImageFile = null;
                renderComposerImagePreview();
                if (message) message.textContent = 'Fotografia môže mať maximálne 5 MB.';
                return;
            }

            selectedPostImageFile = file;
            composerImageUrl = null;
            if (message) message.textContent = '';
            renderComposerImagePreview();
        }

        async function uploadPostImage(file, csrfToken) {
            const formData = new FormData();
            formData.append('image', file);

            const response = await fetch(`${API_BASE}/cloudinary/upload?folder=blog`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'x-csrf-token': csrfToken },
                body: formData
            });

            const payload = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(payload.message || 'Nepodarilo sa nahrať fotografiu do galérie Cloudinary.');
            return payload.url || null;
        }

        async function loadPublicPosts() {
            const response = await fetch(`${API_BASE}/blog`, { method: 'GET', credentials: 'include' });
            if (!response.ok) throw new Error('Nepodarilo sa načítať blog príspevky.');
            const payload = await response.json();
            return Array.isArray(payload.items) ? payload.items : [];
        }

        async function loadManagePosts() {
            if (!currentUser || !['blogger', 'coach', 'admin'].includes(currentUser.role)) {
                manageItems = [];
                return;
            }
            const response = await fetch(`${API_BASE}/blog/manage`, { method: 'GET', credentials: 'include' });
            if (!response.ok) { manageItems = []; return; }
            const payload = await response.json();
            manageItems = Array.isArray(payload.items) ? payload.items : [];
        }

        function buildPostCardHtml(post) {
            const canEdit = canManagePost(post);
            const tagHtml = (post.tags && post.tags.length > 0)
                ? `<span class="post-tag">${escapeHtml(post.tags[0])}</span>`
                : '';
            const featuredHtml = post.featured
                ? `<span class="featured-badge"><i class="fas fa-thumbtack"></i> Pripnuté</span>`
                : '';
            const viewHtml = `<span class="view-count"><i class="fas fa-eye"></i> ${post.viewCount ?? 0}</span>`;
            const imageHtml = post.imageUrl
                ? `<img class="post-card-image" src="${escapeHtml(post.imageUrl)}" alt="" loading="lazy" />`
                : `<div class="post-card-image-placeholder"><i class="fas fa-futbol"></i></div>`;
            const actionsHtml = canEdit ? `
                <div class="post-card-actions">
                    <button class="btn btn-back" style="font-size:12px;padding:6px 10px;" type="button" onclick="event.preventDefault();event.stopPropagation();startEditPost('${post.id}')"><i class="fas fa-edit"></i> Upraviť</button>
                    <button class="btn btn-danger" style="font-size:12px;padding:6px 10px;" type="button" onclick="event.preventDefault();event.stopPropagation();deletePost('${post.id}')"><i class="fas fa-trash"></i> Odstrániť</button>
                </div>
            ` : '';
            return `
                <a class="post-card" href="/pages/blog_post.html?id=${post.id}" aria-label="${escapeHtml(post.title)}">
                    ${imageHtml}
                    <div class="post-card-body">
                        <h3 class="post-card-title">${escapeHtml(post.title)}</h3>
                        <div class="post-card-meta">
                            ${tagHtml}${featuredHtml}
                            <span>${escapeHtml(post.createdBy)}</span>
                            <span>•</span>
                            <span>${formatDate(post.createdAt)}</span>
                            ${viewHtml}
                        </div>
                    </div>
                    ${actionsHtml}
                </a>
            `;
        }

        function renderPosts(orderedPosts) {
            const container = document.getElementById('postsContainer');
            const featuredSection = document.getElementById('featuredSection');
            const featuredContainer = document.getElementById('featuredContainer');

            let posts = orderedPosts;
            if (currentTagFilter !== 'Všetky') {
                posts = orderedPosts.filter((post) => post.tags && post.tags.includes(currentTagFilter));
            }

            // Split featured vs regular (featured only shown in featured section when no tag filter)
            const featuredPosts = currentTagFilter === 'Všetky' ? posts.filter(p => p.featured) : [];
            const regularPosts = currentTagFilter === 'Všetky' ? posts.filter(p => !p.featured) : posts;

            if (featuredContainer && featuredSection) {
                if (featuredPosts.length > 0) {
                    featuredContainer.innerHTML = featuredPosts.map(buildPostCardHtml).join('');
                    featuredSection.style.display = 'block';
                } else {
                    featuredSection.style.display = 'none';
                }
            }

            if (!regularPosts.length && !featuredPosts.length) {
                container.innerHTML = '<div class="muted" style="margin-top: 12px;grid-column:1/-1;">Zatiaľ nie sú žiadne príspevky pre tento filter.</div>';
                return;
            }

            container.innerHTML = regularPosts.length
                ? regularPosts.map(buildPostCardHtml).join('')
                : '<div class="muted" style="grid-column:1/-1;">Žiadne ďalšie príspevky.</div>';
        }

        async function refresh() {
            if (window.OSKSession) {
                currentUser = await window.OSKSession.syncCurrentUserFromSession();
            } else {
                const raw = localStorage.getItem('currentUser');
                currentUser = raw ? JSON.parse(raw) : { username: null, role: null, playerCategory: null, isLoggedIn: false };
            }

            const roleInfo = document.getElementById('blogRoleInfo');
            const composer = document.getElementById('composerCard');

            if (currentUser && ['blogger', 'coach', 'admin'].includes(currentUser.role)) {
                composer.style.display = 'block';
                if (roleInfo) roleInfo.textContent = `Prihlásený: ${currentUser.username} (${currentUser.role})`;
                updateComposerUi();
            } else {
                composer.style.display = 'none';
                resetComposer();
                if (roleInfo) roleInfo.textContent = '';
            }

            const publicPosts = await loadPublicPosts();
            await loadManagePosts();

            const byId = new Map();
            publicPosts.forEach((item) => byId.set(item.id, item));
            manageItems.forEach((item) => byId.set(item.id, item));

            const orderedPosts = Array.from(byId.values()).sort((a, b) => {
                // Featured posts sorted first by date, then non-featured by date
                if (a.featured && !b.featured) return -1;
                if (!a.featured && b.featured) return 1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            window.__blogPostsById = new Map(orderedPosts.map((post) => [post.id, post]));
            renderTagFilters(orderedPosts);
            renderPosts(orderedPosts);
        }

        async function savePost() {
            const titleInput = document.getElementById('postTitle');
            const contentInput = document.getElementById('postContent');
            const message = document.getElementById('composerMessage');
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const isEditing = Boolean(editingPostId);
            const existingPost = isEditing && window.__blogPostsById ? window.__blogPostsById.get(editingPostId) : null;

            if (!title || !content) {
                message.textContent = 'Nadpis aj obsah sú povinné.';
                return;
            }

            try {
                message.textContent = isEditing ? 'Ukladám zmeny príspevku...' : 'Ukladám príspevok...';
                const csrfToken = window.OSKSession ? await window.OSKSession.ensureCsrfToken() : '';
                let imageUrl = composerImageUrl;

                if (selectedPostImageFile) {
                    message.textContent = 'Nahrávam fotografiu...';
                    imageUrl = await uploadPostImage(selectedPostImageFile, csrfToken);
                    message.textContent = isEditing ? 'Ukladám zmeny príspevku...' : 'Ukladám príspevok...';
                }

                const tagSelect = document.getElementById('postTag');
                const featuredCheck = document.getElementById('postFeatured');
                const selectedTag = tagSelect ? tagSelect.value.trim() : '';

                const response = await fetch(isEditing ? `${API_BASE}/blog/${editingPostId}` : `${API_BASE}/blog`, {
                    method: isEditing ? 'PUT' : 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrfToken },
                    body: JSON.stringify({
                        title,
                        content,
                        published: existingPost ? existingPost.published !== false : true,
                        featured: featuredCheck ? featuredCheck.checked : false,
                        imageUrl,
                        tags: selectedTag ? [selectedTag] : []
                    })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || (isEditing ? 'Nepodarilo sa upraviť blog príspevok.' : 'Nepodarilo sa vytvoriť blog príspevok.'));

                await refresh();
                resetComposer({ keepMessage: true });
                message.textContent = isEditing ? 'Príspevok bol upravený.' : 'Príspevok bol vytvorený.';
            } catch (error) {
                message.textContent = error.message || (isEditing ? 'Nepodarilo sa upraviť blog príspevok.' : 'Nepodarilo sa vytvoriť blog príspevok.');
            }
        }

        async function deletePost(id) {
            if (!confirm('Odstrániť blog príspevok?')) return;
            try {
                const csrfToken = window.OSKSession ? await window.OSKSession.ensureCsrfToken() : '';
                const response = await fetch(`${API_BASE}/blog/${id}`, {
                    method: 'DELETE',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrfToken }
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(payload.message || 'Nepodarilo sa odstrániť blog príspevok.');
                await refresh();
            } catch (error) {
                alert(error.message || 'Nepodarilo sa odstrániť blog príspevok.');
            }
        }

        window.deletePost = deletePost;
        window.savePost = savePost;
        window.startEditPost = startEditPost;
        window.resetComposer = resetComposer;
        window.handlePostImageSelection = handlePostImageSelection;
        window.clearSelectedPostImage = clearSelectedPostImage;
        window.filterByTag = filterByTag;

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.OSKSession) {
                currentUser = await window.OSKSession.syncCurrentUserFromSession();
            }
            await refresh();

            // Handle ?edit=ID from blog_post.html delete/edit redirect
            const editId = new URLSearchParams(window.location.search).get('edit');
            if (editId) {
                // Wait for posts to load then start editing
                setTimeout(() => {
                    if (window.__blogPostsById && window.__blogPostsById.has(editId)) {
                        startEditPost(editId);
                    }
                }, 100);
            }
        });

        window.addEventListener('osk-auth-changed', async () => {
            if (window.OSKSession) {
                currentUser = await window.OSKSession.syncCurrentUserFromSession();
            }
            refresh().catch(console.error);
        });
    </script>
